n Revelation resemble a lion, ox, man, and eagle.", "options": ["True", "False"], "correct": 0, "fact": "Revelation 4:7 — The four creatures resemble a lion, an ox, a man, and a flying eagle. They parallel the cherubim in Ezekiel 1."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What happened to Elijah after he defeated the prophets of Baal?", "options": ["He became king", "He fled from Jezebel", "He went to Jerusalem", "He was taken to heaven"], "correct": 1, "fact": "1 Kings 19:1-3 — When Jezebel threatened to kill him, Elijah fled into the desert, exhausted and depressed. God met him tenderly with food and encouragement."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: The prophet Nahum name means comfort or consolation.", "options": ["True", "False"], "correct": 0, "fact": "Nahum comes from the Hebrew nacham, meaning comfort. Though his book focuses on judgment against Nineveh, his name ironically means consolation."}, {"type": "mc", "category": "✝️ New Testament", "question": "James says to count it ___ when you face various trials.", "options": ["A curse", "Pure joy", "A testing", "A burden"], "correct": 1, "fact": "James 1:2 — Consider it pure joy, my brothers and sisters, whenever you face trials of many kinds, because the testing of your faith produces perseverance."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The book of Deuteronomy is Moses farewell address to Israel.", "options": ["True", "False"], "correct": 0, "fact": "Deuteronomy consists of Moses three speeches recapping the law and Israel history before his death on Mount Nebo. Its name means repetition of the law."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What name means God is my strength among the major prophets?", "options": ["Isaiah", "Jeremiah", "Ezekiel", "Daniel"], "correct": 2, "fact": "The name Ezekiel (Yehezqel in Hebrew) means God will strengthen or God is my strength, fitting for a prophet called to speak during the Babylonian exile."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does sanctification mean in Christian theology?", "options": ["Being declared righteous", "The process of being made holy", "Forgiveness of sins", "Baptism with the Spirit"], "correct": 1, "fact": "Sanctification refers to the ongoing process by which the Holy Spirit makes believers more like Christ. It follows justification and continues throughout life."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: God commanded Hosea to go and love his unfaithful wife again.", "options": ["True", "False"], "correct": 0, "fact": "Hosea 3:1 — God said Go, show your love to your wife again, though she is loved by another man. This pictured God love for unfaithful Israel."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What are the Psalms of Ascent?", "options": ["Psalms written by priests", "Psalms 120-134, sung by pilgrims going to Jerusalem", "Psalms about God majesty", "Psalms composed during the Exodus"], "correct": 1, "fact": "Psalms 120-134 are called Psalms of Ascent. Jewish pilgrims sang them while ascending to Jerusalem for the three great annual feasts."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Paul describes the armor of God in his letter to the Ephesians.", "options": ["True", "False"], "correct": 0, "fact": "Ephesians 6:10-17 — Paul lists six pieces of spiritual armor: belt of truth, breastplate of righteousness, shoes of peace, shield of faith, helmet of salvation, and sword of the Spirit."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What is the significance of the Day of Atonement (Yom Kippur)?", "options": ["Celebrating the Exodus", "Annual cleansing of Israel sins through blood sacrifice", "Celebrating the giving of the Law", "Remembering the wilderness wandering"], "correct": 1, "fact": "Leviticus 16 — On Yom Kippur, the High Priest offered sacrifice for all of Israel sins and sent a scapegoat into the wilderness bearing the nation transgressions."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The Bible teaches that humans are created in the image of God (imago Dei).", "options": ["True", "False"], "correct": 0, "fact": "Genesis 1:27 — So God created mankind in his own image, in the image of God he created them; male and female he created them. This affirms the dignity of every person."}, {"type": "mc", "category": "✝️ New Testament", "question": "Paul wrote whatever is true, whatever is noble... think about such things in which letter?", "options": ["Colossians", "Romans", "Philippians", "Ephesians"], "correct": 2, "fact": "Philippians 4:8 — Paul lists eight qualities to meditate on: true, noble, right, pure, lovely, admirable, excellent, praiseworthy."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Micah condemned both corrupt leaders and false prophets.", "options": ["True", "False"], "correct": 0, "fact": "Micah 3:5,11 — Micah rebuked prophets who cried peace for pay, priests who taught for a price, and princes who judged for bribes."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What is Proverbs 3:5-6 about?", "options": ["Trusting in wealth", "Trusting the Lord rather than your own understanding", "Fearing the Lord in worship", "Honoring parents"], "correct": 1, "fact": "Proverbs 3:5-6 — Trust in the Lord with all your heart and lean not on your own understanding; in all your ways submit to him, and he will make your paths straight."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Paul described himself as the chief of sinners.", "options": ["True", "False"], "correct": 0, "fact": "1 Timothy 1:15 — Christ Jesus came into the world to save sinners — of whom I am the worst. Paul considered his persecution of the church the greatest possible sin."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "Which Psalm begins The Lord is my light and my salvation?", "options": ["Psalm 1", "Psalm 27", "Psalm 91", "Psalm 100"], "correct": 1, "fact": "Psalm 27:1 — This psalm of David expresses complete trust in God despite enemies and dangers. It ends with wait for the Lord."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Solomon built the first Temple in Jerusalem.", "options": ["True", "False"], "correct": 0, "fact": "1 Kings 6 — Solomon built the Temple on Mount Moriah in Jerusalem. It stood about 400 years until destroyed by Babylon in 586 BC."}, {"type": "mc", "category": "✝️ New Testament", "question": "In Romans 8:28, all things work together for good for whom?", "options": ["All people", "Those who are religious", "Those who love God and are called according to His purpose", "Those who obey the law"], "correct": 2, "fact": "Romans 8:28 — We know that in all things God works for the good of those who love him, who have been called according to his purpose."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Zephaniah warned of the Day of the Lord during King Josiah reign.", "options": ["True", "False"], "correct": 0, "fact": "Zephaniah 1:1 — Zephaniah prophesied during the reign of Josiah. His book focuses on the Day of the Lord as both judgment and ultimate hope for a remnant."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What does the Hebrew word Torah primarily refer to?", "options": ["The entire Old Testament", "The five books of Moses", "All Jewish scripture", "The Ten Commandments only"], "correct": 1, "fact": "Torah (meaning instruction or law) refers primarily to the five books of Moses: Genesis, Exodus, Leviticus, Numbers, and Deuteronomy."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Jesus said I am the way, the truth, and the life in the Gospel of John.", "options": ["True", "False"], "correct": 0, "fact": "John 14:6 — Jesus answered, I am the way and the truth and the life. No one comes to the Father except through me. This is one of seven I Am statements in John."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What is the Shema in Judaism?", "options": ["A prayer for the Sabbath", "Hear, O Israel: the Lord our God, the Lord is one", "A blessing over food", "A priestly benediction"], "correct": 1, "fact": "Deuteronomy 6:4 — The Shema (Hear) is the foundational confession of Jewish faith. Jesus cited it as the greatest commandment (Mark 12:29-30)."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The Passover lamb was to be without blemish according to Exodus 12.", "options": ["True", "False"], "correct": 0, "fact": "Exodus 12:5 — The animals you choose must be year-old males without defect. This requirement pointed to Jesus as the perfect, sinless Lamb of God (1 Peter 1:19)."}, {"type": "mc", "category": "✝️ New Testament", "question": "Paul writes the greatest of these is ___ at the end of 1 Corinthians 13.", "options": ["Faith", "Hope", "Love", "Grace"], "correct": 2, "fact": "1 Corinthians 13:13 — And now these three remain: faith, hope and love. But the greatest of these is love. Agape love surpasses all else."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: Ecclesiastes teaches that life is meaningless apart from God.", "options": ["True", "False"], "correct": 0, "fact": "Ecclesiastes 12:13-14 — Fear God and keep his commandments, for this is the duty of all mankind. Without God, all is vanity or futility."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Which Old Testament figure was known for extreme patience in suffering?", "options": ["Moses", "Job", "Jeremiah", "David"], "correct": 1, "fact": "James 5:11 — You have heard of Job perseverance. Despite losing his wealth, family, and health, Job remained faithful through his ordeal."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Great Commission commands believers to make disciples of all nations.", "options": ["True", "False"], "correct": 0, "fact": "Matthew 28:19-20 — Go and make disciples of all nations, baptizing them in the name of the Father and of the Son and of the Holy Spirit."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does redemption mean in a biblical sense?", "options": ["Being saved from sin", "Being bought back from bondage", "Being sanctified by God", "Being predestined for salvation"], "correct": 1, "fact": "Redemption (Hebrew: gaal; Greek: apolytrosis) literally means to buy back. God redeems sinners from the bondage of sin and death at the price of Christ blood."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Proverbs 31 describes the virtuous woman or wife of noble character.", "options": ["True", "False"], "correct": 0, "fact": "Proverbs 31:10-31 — This poem describes a woman who is industrious, wise, charitable, and God-fearing. In Hebrew it is an acrostic poem."}, {"type": "mc", "category": "✝️ New Testament", "question": "Which New Testament letter was written to a personal friend about a runaway slave?", "options": ["Titus", "2 Timothy", "Philemon", "3 John"], "correct": 2, "fact": "Philemon is Paul most personal epistle, written to a Christian slave owner on behalf of Onesimus, asking him to receive Onesimus back as a brother in Christ."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: The prophet Ezekiel was also a priest.", "options": ["True", "False"], "correct": 0, "fact": "Ezekiel 1:3 — The word of the Lord came to Ezekiel the priest, the son of Buzi. He was called to prophesy among the exiles in Babylon while of priestly lineage."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What Psalm did Jesus quote from the cross: My God, my God, why have you forsaken me?", "options": ["Psalm 22", "Psalm 23", "Psalm 31", "Psalm 69"], "correct": 0, "fact": "Psalm 22:1 — David wrote this lament, which Jesus quoted (Matthew 27:46). The psalm describes pierced hands and feet, and dividing of garments — all fulfilled at the crucifixion."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Paul was shipwrecked at least three times.", "options": ["True", "False"], "correct": 0, "fact": "2 Corinthians 11:25 — Three times I was shipwrecked. One of these is narrated in Acts 27, when Paul was shipwrecked on Malta."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What is the purpose of the book of Ruth?", "options": ["To record a war history", "To show God faithfulness through a Gentile woman who enters Jesus lineage", "To document the laws of marriage", "To tell the history of the judges"], "correct": 1, "fact": "Ruth shows God faithfulness and inclusion of Gentiles. Ruth, a Moabite, became the great-grandmother of King David and is named in Jesus genealogy in Matthew 1:5."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Paul first missionary journey began in Antioch.", "options": ["True", "False"], "correct": 0, "fact": "Acts 13:1-3 — The Holy Spirit said, Set apart for me Barnabas and Saul for the work to which I have called them. They were sent out from the church at Antioch."}, {"type": "mc", "category": "✝️ New Testament", "question": "What does Paul mean by justification in Romans?", "options": ["Being made sinless", "Being declared righteous by God through faith", "Earning God favor through good deeds", "Being set apart for service"], "correct": 1, "fact": "Romans 5:1 — Since we have been justified through faith, we have peace with God. Justification is a legal declaration: believers are declared righteous in God sight."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What was Mount Sinai also called in Deuteronomy?", "options": ["Mount Zion", "Mount Moriah", "Mount Nebo", "Mount Horeb"], "correct": 3, "fact": "Deuteronomy uses Horeb for what Exodus calls Sinai. Both names refer to the same mountain where God gave the law to Moses."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Jesus healed the man born blind by making mud from dirt and saliva.", "options": ["True", "False"], "correct": 0, "fact": "John 9:6-7 — Jesus spat on the ground, made mud, applied it to the man eyes, and sent him to wash in the Pool of Siloam. The man came back seeing."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What are the Synoptic Gospels?", "options": ["Matthew, Mark, and Luke", "Matthew, Mark, and John", "Mark, Luke, and John", "Matthew, Luke, and John"], "correct": 0, "fact": "Matthew, Mark, and Luke are called Synoptic (from Greek, meaning seen together) because they share much of the same material, unlike the very different Gospel of John."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: The New Covenant was first prophesied by Jeremiah.", "options": ["True", "False"], "correct": 0, "fact": "Jeremiah 31:31-33 — I will make a new covenant with the people of Israel... I will put my law in their minds and write it on their hearts. Jesus fulfilled this at the Last Supper."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What does the Hebrew word Hesed (steadfast love) primarily describe?", "options": ["Physical strength", "God faithful covenant love", "Righteous anger", "Victorious power"], "correct": 1, "fact": "Hesed is one of the most important Hebrew words, describing God loyal, covenant-keeping love — rich with kindness, mercy, and unfailing faithfulness to His people."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Gospel of Mark is the shortest of the four Gospels.", "options": ["True", "False"], "correct": 0, "fact": "Mark has 16 chapters compared to Matthew 28, Luke 24, and John 21. Mark is fast-paced and action-oriented, using the word immediately over 40 times."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "A house divided against itself cannot stand was said by whom?", "options": ["Solomon", "Paul", "Jesus", "Moses"], "correct": 2, "fact": "Matthew 12:25 — Jesus said Every kingdom divided against itself will be ruined, responding to accusations about Beelzebul."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The Ark of Noah landed on Mount Ararat.", "options": ["True", "False"], "correct": 0, "fact": "Genesis 8:4 — The ark came to rest on the mountains of Ararat. The region of Ararat corresponds to modern-day eastern Turkey near the Armenian border."}, {"type": "mc", "category": "✝️ New Testament", "question": "Jesus said Before Abraham was born, ___.", "options": ["I will be", "I AM", "I existed", "I was sent"], "correct": 1, "fact": "John 8:58 — Very truly I tell you, before Abraham was born, I am! This bold claim to divine identity caused the Jews to pick up stones to throw at Him."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Amos declared Let justice roll down like waters and righteousness like an ever-flowing stream.", "options": ["True", "False"], "correct": 0, "fact": "Amos 5:24 — This became a rallying cry for social justice. Amos rebuked Israel for economic oppression of the poor and empty religious rituals."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Which king of Judah found the Book of the Law and led a great reformation?", "options": ["Hezekiah", "Jehoshaphat", "Josiah", "Asa"], "correct": 2, "fact": "2 Kings 22-23 — During Temple repairs, the priest Hilkiah found the Book of the Law. When read to Josiah, he tore his robes in repentance and led sweeping religious reform."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Holy Spirit is called the Spirit of Truth in John Gospel.", "options": ["True", "False"], "correct": 0, "fact": "John 14:17; 15:26; 16:13 — Jesus repeatedly calls the Spirit the Spirit of truth who guides believers into all truth and testifies about Jesus."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does covenant mean in the Bible?", "options": ["A set of laws", "A sacred binding agreement between two parties", "A form of worship", "A royal decree"], "correct": 1, "fact": "Biblical covenants (Hebrew: berit) are formal, binding agreements. Major covenants include those with Noah, Abraham, Moses, David, and the New Covenant in Christ."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The book of Leviticus primarily deals with laws for priests and worship.", "options": ["True", "False"], "correct": 0, "fact": "Leviticus (from the tribe of Levi) covers laws for sacrifice, ritual purity, the priesthood, and holy living. Its theme is Be holy because I, the Lord your God, am holy (19:2)."}, {"type": "mc", "category": "✝️ New Testament", "question": "What is the main theme of the book of Hebrews?", "options": ["Christian suffering", "The supremacy of Christ over the Old Testament system", "The gifts of the Spirit", "Paul missionary journeys"], "correct": 1, "fact": "Hebrews argues that Jesus is superior to angels, Moses, the Levitical priesthood, and the old covenant — the ultimate High Priest offering the final sacrifice."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: God told Jonah that Nineveh had 120,000 people who could not tell their right hand from their left.", "options": ["True", "False"], "correct": 0, "fact": "Jonah 4:11 — God said Should I not have concern for the great city of Nineveh, in which there are more than a hundred and twenty thousand people?"}, {"type": "mc", "category": "⚡ Old Testament", "question": "Who was the first priest of Israel?", "options": ["Moses", "Aaron", "Eleazar", "Phinehas"], "correct": 1, "fact": "Exodus 28:1 — God commanded Moses to bring Aaron and his sons to serve as priests. Aaron was consecrated as the first High Priest of Israel."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Jesus raised the widow son at Nain without being asked.", "options": ["True", "False"], "correct": 0, "fact": "Luke 7:13-14 — When the Lord saw her, his heart went out to her and he said, Do not cry. Then he went up and touched the bier... he said, Young man, get up!"}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What is the Lord Prayer sometimes called?", "options": ["The Disciples Prayer", "The Model Prayer", "The Our Father", "All of the above"], "correct": 3, "fact": "While popularly known as The Lord Prayer, it is technically a prayer Jesus gave as a model for disciples. It is also called the Model Prayer or the Our Father."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Isaiah had a vision calling him to ministry in the year King Uzziah died.", "options": ["True", "False"], "correct": 0, "fact": "Isaiah 6:1 — In the year that King Uzziah died, I saw the Lord, high and exalted, seated on a throne. This vision of God holiness commissioned Isaiah as a prophet."}, {"type": "mc", "category": "✝️ New Testament", "question": "Peter confession You are the Messiah, the Son of the living God was made where?", "options": ["Jerusalem", "Capernaum", "Caesarea Philippi", "Galilee"], "correct": 2, "fact": "Matthew 16:13-16 — At Caesarea Philippi, Jesus asked Who do you say I am? Peter answered with this confession. Jesus called him blessed, saying it was revealed by the Father."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Obadiah wrote the longest prophetic book in the Old Testament.", "options": ["True", "False"], "correct": 1, "fact": "Obadiah is the shortest book in the Old Testament, with only 21 verses. It prophesies against Edom for its pride and violence against Judah."}, {"type": "mc", "category": "⚡ Old Testament", "question": "When was Solomon Temple in Jerusalem first destroyed?", "options": ["722 BC", "586 BC", "539 BC", "70 BC"], "correct": 1, "fact": "2 Kings 25:9 — In 586 BC, Nebuchadnezzar army destroyed Solomon Temple and razed Jerusalem. The Temple was later rebuilt by Zerubbabel."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Book of Acts ends with Paul under house arrest in Rome.", "options": ["True", "False"], "correct": 0, "fact": "Acts 28:30-31 — For two whole years Paul stayed there in his own rented house and welcomed all who came to see him, proclaiming the kingdom of God."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "Which Old Testament figure is described as blameless and upright, one who feared God and turned from evil?", "options": ["Abraham", "Enoch", "Job", "Noah"], "correct": 2, "fact": "Job 1:1 — This description of Job establishes that his suffering was not due to personal sin, challenging the assumption that all suffering is a consequence of wrongdoing."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The Feast of Tabernacles (Sukkot) commemorated Israel 40 years in the wilderness.", "options": ["True", "False"], "correct": 0, "fact": "Leviticus 23:43 — So your descendants will know that I had the Israelites live in temporary shelters when I brought them out of Egypt. Sukkot lasts seven days."}, {"type": "mc", "category": "✝️ New Testament", "question": "What did Jesus mean when He said you must be born again to Nicodemus?", "options": ["A physical rebirth", "A spiritual regeneration by the Holy Spirit", "A religious ceremony", "A moral reformation"], "correct": 1, "fact": "John 3:5-6 — Jesus explained born of water and the Spirit. Spiritual rebirth by the Holy Spirit is necessary to enter God kingdom — not a physical second birth."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Joel prophesied that God would pour out His Spirit on all people.", "options": ["True", "False"], "correct": 0, "fact": "Joel 2:28-29 — I will pour out my Spirit on all people. Your sons and daughters will prophesy, your old men will dream dreams. Peter quoted this on Pentecost."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Who was the wicked queen who promoted Baal worship in Israel?", "options": ["Athaliah", "Vashti", "Herodias", "Jezebel"], "correct": 3, "fact": "1 Kings 16:31-33 — Jezebel, daughter of the Phoenician king, led Ahab and Israel into Baal worship. She killed prophets of the Lord and was ultimately thrown from a window."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Paul connected his gospel to the Old Testament by quoting Moses and the Prophets.", "options": ["True", "False"], "correct": 0, "fact": "Acts 26:22-23 — Paul said I am saying nothing beyond what the prophets and Moses said would happen — that the Messiah would suffer and be the first to rise from the dead."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does Sabbath mean?", "options": ["Prayer", "Rest", "Holy", "Worship"], "correct": 1, "fact": "The Hebrew shabbat means to rest or to cease. God rested on the seventh day (Genesis 2:2-3) and commanded Israel to observe a day of rest (Exodus 20:8-11)."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: John 3:16 is often called the Gospel in a nutshell.", "options": ["True", "False"], "correct": 0, "fact": "John 3:16 — For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life. It summarizes the gospel concisely."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "How many angels are named in the Bible?", "options": ["One", "Two", "Three", "Seven"], "correct": 1, "fact": "Only Michael and Gabriel are named as angels in the Bible. Michael is called an archangel (Jude 9) and Gabriel appears in Daniel and Luke 1."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Galatians was written because false teachers were adding circumcision as a requirement for salvation.", "options": ["True", "False"], "correct": 0, "fact": "Galatians 1:6-7 — Judaizers were teaching that Gentile believers must be circumcised and follow the Mosaic law. Paul called this a different gospel and opposed it sharply."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What does the number 40 often signify in the Bible?", "options": ["A sacred number for priests", "A period of testing or transition", "Exactly 40 days always", "The number of books in the Torah"], "correct": 1, "fact": "The number 40 repeatedly marks periods of testing: rain for 40 days, Israel wandering 40 years, Moses on Sinai 40 days, Elijah journey 40 days, Jesus tempted 40 days."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The Protestant Bible contains 31,102 verses.", "options": ["True", "False"], "correct": 0, "fact": "Protestant Bibles contain 31,102 verses — 23,145 in the Old Testament and 7,957 in the New Testament."}, {"type": "mc", "category": "✝️ New Testament", "question": "The Parable of the Ten Virgins is about being prepared for whose coming?", "options": ["The High Priest", "A king", "The bridegroom", "The harvest master"], "correct": 2, "fact": "Matthew 25:1-13 — Five wise virgins brought extra oil; five foolish ones did not. Jesus told this parable urging readiness for His second coming."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: God appeared to Solomon in a dream and asked what he wanted.", "options": ["True", "False"], "correct": 0, "fact": "1 Kings 3:5 — At Gibeon the Lord appeared to Solomon during the night in a dream, and God said, Ask for whatever you want me to give you."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "Which New Testament letter contains the Kenosis passage describing Jesus emptying Himself?", "options": ["Colossians", "Galatians", "Philippians", "Hebrews"], "correct": 2, "fact": "Philippians 2:5-8 — Christ Jesus, who, being in very nature God, did not consider equality with God something to be used to his own advantage; rather, he made himself nothing..."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Sermon on the Mount includes teaching on fasting, prayer, and giving.", "options": ["True", "False"], "correct": 0, "fact": "Matthew 6 — Jesus gives teaching on all three spiritual disciplines, warning against doing them to be seen by others, with the instruction to do them in secret before God."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What was the purpose of the Year of Jubilee in Israel?", "options": ["A military parade", "Release of debts, slaves, and return of land every 50 years", "A harvest celebration", "Annual forgiveness of sins"], "correct": 1, "fact": "Leviticus 25 — Every 50th year, debts were cancelled, Hebrew slaves were freed, and land returned to original owners. It was meant to prevent permanent poverty and inequality."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The Bible says money is the root of all evil.", "options": ["True", "False"], "correct": 1, "fact": "1 Timothy 6:10 — For the love of money is a root of all kinds of evil. Money itself is neutral; it is the love of money (greed) that leads to all kinds of sin."}, {"type": "mc", "category": "✝️ New Testament", "question": "What does Paraclete (used for the Holy Spirit in John) mean?", "options": ["Holy One", "Comforter or Advocate or Helper", "Spirit of fire", "Divine presence"], "correct": 1, "fact": "John 14:26 — Paraclete (parakletos) means one called alongside to help. It is translated as Comforter (KJV), Advocate (NIV), or Helper (ESV) in different English versions."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The tribe of Benjamin was nearly wiped out due to a civil war among the tribes of Israel.", "options": ["True", "False"], "correct": 0, "fact": "Judges 19-21 — After the sin at Gibeah (a Benjaminite city), the other tribes went to war. All but 600 Benjaminite men were killed before peace was restored."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does the word Pentecost mean?", "options": ["Harvest festival", "Fiftieth", "Feast of weeks", "Day of fire"], "correct": 1, "fact": "Pentecost comes from the Greek for fiftieth. It occurred 50 days after Passover. The Holy Spirit descended on the church on this day."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Paul was originally named Saul.", "options": ["True", "False"], "correct": 0, "fact": "Acts 7:58 and 13:9 — Saul who was also called Paul. He was a Jewish Pharisee from Tarsus who persecuted Christians until his dramatic conversion on the road to Damascus."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Which book records the giving of the Law at Mount Sinai?", "options": ["Genesis", "Leviticus", "Exodus", "Numbers"], "correct": 2, "fact": "Exodus 19-20 records God appearance at Sinai and the giving of the Ten Commandments. Leviticus continues with detailed laws given during this same period."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The Dead Sea Scrolls confirmed the accuracy of the Old Testament manuscripts.", "options": ["True", "False"], "correct": 0, "fact": "Discovered in 1947, the Dead Sea Scrolls included copies of all Old Testament books except Esther, some dating to 200 BC, confirming the remarkable preservation of Scripture."}, {"type": "mc", "category": "✝️ New Testament", "question": "Jesus said You will know them by their ___ in the Sermon on the Mount.", "options": ["Words", "Deeds", "Fruits", "Faith"], "correct": 2, "fact": "Matthew 7:16 — By their fruit you will recognize them. Jesus warned of false prophets who look good on the outside but bear bad fruit. Genuine faith produces visible fruit."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Cain was the first murderer recorded in the Bible.", "options": ["True", "False"], "correct": 0, "fact": "Genesis 4:8 — While they were in the field, Cain attacked his brother Abel and killed him. Motivated by jealousy over God acceptance of Abel offering, Cain committed the first murder."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "Which Messianic Psalm is most frequently quoted in the New Testament?", "options": ["Psalm 2", "Psalm 22", "Psalm 110", "Psalm 118"], "correct": 2, "fact": "Psalm 110 is the most frequently quoted OT passage in the NT, cited or alluded to over 30 times. It begins The Lord says to my lord: Sit at my right hand..."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Apostle John wrote the Gospel of John, three letters of John, and Revelation.", "options": ["True", "False"], "correct": 0, "fact": "Tradition attributes all five to John the Apostle, forming a unified theological body of work emphasizing love, truth, light, eternal life, and Jesus as the Word of God."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What did God promise Abraham in the Abrahamic Covenant?", "options": ["A great army", "Land, descendants, and blessing to all nations", "Wisdom and wealth", "Deliverance from enemies"], "correct": 1, "fact": "Genesis 12:1-3; 15; 17 — God promised Abraham land (Canaan), countless descendants, and that all nations would be blessed through him — ultimately fulfilled in Jesus Christ."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The book of Acts is sometimes called The Acts of the Holy Spirit.", "options": ["True", "False"], "correct": 0, "fact": "Though titled The Acts of the Apostles, many scholars call it The Acts of the Holy Spirit because the Spirit is the driving force behind every major event."}, {"type": "mc", "category": "✝️ New Testament", "question": "Which of these is NOT one of the seven I AM statements of Jesus in John?", "options": ["I am the bread of life", "I am the light of the world", "I am the resurrection and the life", "I am the king of kings"], "correct": 3, "fact": "Jesus said: I am the bread of life (6:35), light of the world (8:12), gate (10:9), good shepherd (10:11), resurrection and life (11:25), way/truth/life (14:6), and vine (15:1)."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Numbers records the appointment of Joshua as Moses successor.", "options": ["True", "False"], "correct": 0, "fact": "Numbers 27:18-23 — God told Moses to commission Joshua and lay hands on him before Eleazar the priest and all the assembly, officially appointing him as the next leader."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What was the Urim and Thummim used for in ancient Israel?", "options": ["Playing music in the Temple", "Divining God will by the High Priest", "Ceremonial hand washing", "Measuring offerings"], "correct": 1, "fact": "Exodus 28:30 — The Urim and Thummim were objects kept in the High Priest breastpiece used to seek God guidance on important national decisions. Their exact nature is unknown."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Paul writes in Romans there is no condemnation for those who are in Christ Jesus.", "options": ["True", "False"], "correct": 0, "fact": "Romans 8:1 — Therefore, there is now no condemnation for those who are in Christ Jesus. This follows Paul anguished cry in chapter 7 and marks a triumphant turning point."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What is the Mosaic Covenant primarily about?", "options": ["God promise to send a Messiah", "God conditional covenant at Sinai — blessings for obedience, curses for disobedience", "God promise to give Abraham a son", "God promise never to flood the earth"], "correct": 1, "fact": "Deuteronomy 28 — God laid out blessings for obedience and curses for disobedience. Unlike the unconditional Abrahamic covenant, the Mosaic covenant was conditional on Israel faithfulness."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The Bible has been translated into more languages than any other book in history.", "options": ["True", "False"], "correct": 0, "fact": "The Bible has been fully translated into over 700 languages and partially into over 3,500 languages, making it the most translated book in all of human history."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does the Greek word Parousia refer to?", "options": ["The ascension of Jesus", "The second coming of Christ", "The descent of the Holy Spirit", "The rapture of the church"], "correct": 1, "fact": "Parousia (meaning presence or arrival) is the technical term for Christ second coming used in 1 Thessalonians 4, Matthew 24, and James 5."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The word Selah appears frequently in the Psalms and its meaning is uncertain.", "options": ["True", "False"], "correct": 0, "fact": "Selah appears 71 times in Psalms and 3 times in Habakkuk. Its exact meaning is debated — it may be a musical notation meaning pause or lift up for emphasis."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What did manna taste like according to the Bible?", "options": ["Bitter herbs", "Sweet like honey wafers", "Salty like bread", "Bland like grain"], "correct": 1, "fact": "Exodus 16:31 — It tasted like wafers made with honey. Numbers 11:8 adds it tasted like something made with olive oil, suggesting variety in preparation method."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Epistle of Jude warns against false teachers who had crept into the church.", "options": ["True", "False"], "correct": 0, "fact": "Jude 1:4 — Certain individuals whose condemnation was written about long ago have secretly slipped in among you. Jude urges believers to contend earnestly for the faith."}, {"type": "mc", "category": "✝️ New Testament", "question": "In 1 Thessalonians 4, what event is described with a trumpet and archangel voice?", "options": ["The Day of Pentecost", "The destruction of Jerusalem", "The resurrection of the dead in Christ", "The last judgment"], "correct": 2, "fact": "1 Thessalonians 4:16-17 — The Lord himself will come down from heaven, with a loud command, with the voice of the archangel and with the trumpet call of God, and the dead in Christ will rise first."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: Psalm 119 is both the longest psalm and the longest chapter in the Bible.", "options": ["True", "False"], "correct": 0, "fact": "Psalm 119 has 176 verses and is an elaborate acrostic poem with each of its 22 sections corresponding to a successive letter of the Hebrew alphabet."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What instrument did David play to soothe King Saul?", "options": ["A flute", "A drum", "A lyre or harp", "A trumpet"], "correct": 2, "fact": "1 Samuel 16:23 — Whenever the spirit from God came on Saul, David would take up his lyre and play. Then relief would come to Saul, and the evil spirit would leave him."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Paul wrote Be anxious for nothing in his letter to the Philippians.", "options": ["True", "False"], "correct": 0, "fact": "Philippians 4:6-7 — Do not be anxious about anything, but in every situation, by prayer and petition, with thanksgiving, present your requests to God. And the peace of God will guard your hearts."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What is atonement in biblical terms?", "options": ["Achieving moral perfection", "Making amends for sin to restore relationship between God and man", "Being filled with the Holy Spirit", "The act of repentance"], "correct": 1, "fact": "Atonement (Hebrew: kaphar, to cover) refers to the process of making things right between God and sinners. In the OT through sacrifice; ultimately in Jesus death once for all."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The prophet Elijah never died but was taken to heaven alive.", "options": ["True", "False"], "correct": 0, "fact": "2 Kings 2:11 — Elijah is one of only two people in the Bible taken to heaven without dying (the other being Enoch, Genesis 5:24). He appeared at the Transfiguration in Matthew 17."}, {"type": "mc", "category": "✝️ New Testament", "question": "What did Jesus say are the two greatest commandments?", "options": ["Keep the Sabbath and honor parents", "Love God completely and love your neighbor as yourself", "Do not murder and do not steal", "Believe in God and pray always"], "correct": 1, "fact": "Matthew 22:37-40 — Love the Lord your God with all your heart... Love your neighbor as yourself. All the Law and Prophets hang on these two commandments."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: Grace in the New Testament means unmerited favor from God.", "options": ["True", "False"], "correct": 0, "fact": "Ephesians 2:8-9 — For it is by grace you have been saved, through faith — and this is not from yourselves, it is the gift of God — not by works, so that no one can boast. Grace is entirely unearned."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What language was the New Testament originally written in?", "options": ["Hebrew", "Latin", "Aramaic", "Greek"], "correct": 3, "fact": "The New Testament was written in Koine Greek, the common dialect spoken throughout the Roman Empire. This made it widely accessible to people across different cultures."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Peter and John were arrested for healing a lame man at the Temple gate called Beautiful.", "options": ["True", "False"], "correct": 0, "fact": "Acts 3-4 — Peter healed a man lame from birth at the gate called Beautiful. The miracle drew a crowd, Peter preached, and 5,000 believed. The Sanhedrin arrested them."}, {"type": "mc", "category": "📜 Prophets", "question": "Which prophet wrote The Lord your God is in your midst, a mighty one who will save?", "options": ["Isaiah", "Jeremiah", "Zephaniah", "Malachi"], "correct": 2, "fact": "Zephaniah 3:17 — This beloved verse promises God delighting presence. Despite Zephaniah intense judgment passages, it concludes with a tender image of God singing over His people."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The golden calf incident happened while Moses was on Mount Sinai.", "options": ["True", "False"], "correct": 0, "fact": "Exodus 32 — While Moses was on the mountain 40 days, Aaron gave in to the people demand and fashioned a golden calf for them to worship. God wanted to destroy them, but Moses interceded."}, {"type": "mc", "category": "✝️ New Testament", "question": "According to Matthew 5, Jesus said He came not to abolish the Law but to ___.", "options": ["Replace it", "Fulfill it", "Simplify it", "Expand it"], "correct": 1, "fact": "Matthew 5:17 — Do not think that I have come to abolish the Law or the Prophets; I have not come to abolish them but to fulfill them. Jesus is the full completion of all the OT points to."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The term Old Testament is used in the Bible itself.", "options": ["True", "False"], "correct": 1, "fact": "The terms Old Testament and New Testament are later church designations. Paul speaks of the old covenant in 2 Corinthians 3:14, and new covenant is used by Jesus (Luke 22:20)."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What is the main message of the book of Ecclesiastes?", "options": ["True wisdom comes from worldly experience", "Life without God is meaningless; true fulfillment comes from fearing God", "The rewards of righteous living", "Solomon best proverbs"], "correct": 1, "fact": "Ecclesiastes 1:2; 12:13-14 — The Preacher explores life under the sun and concludes everything is vanity (futility) apart from God. The conclusion: fear God and keep His commandments."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Jesus wept only once in the Gospels.", "options": ["True", "False"], "correct": 1, "fact": "Jesus wept at Lazarus tomb (John 11:35) and also wept over Jerusalem (Luke 19:41). Hebrews 5:7 also refers to Jesus offering prayers with loud cries and tears."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does the phrase fear of the Lord mean in the Old Testament?", "options": ["Being terrified of God", "Reverential awe, respect, and submission to God", "Avoiding punishment", "Worshipping correctly"], "correct": 1, "fact": "Proverbs 9:10 — The fear of the Lord is the beginning of wisdom. This phrase describes reverential awe that recognizes God greatness, holiness, and authority, leading to obedience."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Elisha performed more miracles than any other Old Testament prophet.", "options": ["True", "False"], "correct": 0, "fact": "2 Kings 2-13 records approximately twice as many miracles attributed to Elisha as to Elijah. These include healing Naaman leprosy, raising a widow son, and multiplying a widow oil."}, {"type": "mc", "category": "✝️ New Testament", "question": "What does propitiation mean in the context of salvation?", "options": ["To pray for forgiveness", "To satisfy God just wrath against sin", "To make a sacrifice", "To confess one sins"], "correct": 1, "fact": "Romans 3:25 — Christ is the propitiation: the atoning sacrifice that fully satisfies God righteous wrath against sin, restoring peace between God and sinners."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Isaiah is sometimes called the Fifth Gospel because of its many prophecies about Jesus.", "options": ["True", "False"], "correct": 0, "fact": "Isaiah contains some of the most detailed Messianic prophecies in the OT — the virgin birth (7:14), the suffering servant (52:13-53:12), and the anointed one (61:1-2, quoted by Jesus in Luke 4)."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Who was the last judge of Israel before the monarchy began?", "options": ["Gideon", "Eli", "Samuel", "Deborah"], "correct": 2, "fact": "Samuel served as judge, priest, and prophet. 1 Samuel 7-8 records his leadership, and he anointed both Saul and David as kings, bridging the era of judges and kings."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The early church in Acts shared all their possessions voluntarily.", "options": ["True", "False"], "correct": 0, "fact": "Acts 2:44-45 — All the believers were together and had everything in common. They sold property and possessions to give to anyone who had need. This was voluntary, not commanded."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does the Diaspora refer to in Jewish and Christian history?", "options": ["The Exodus from Egypt", "The scattering of Jewish people outside their homeland", "The return from Babylonian exile", "The migration to Jerusalem"], "correct": 1, "fact": "The Diaspora (from Greek: scattering) refers to Jewish communities living outside Israel — first after the Assyrian and Babylonian exiles, then spreading throughout the Greco-Roman world."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: In the book of Job, God allows Satan to test Job but sets limits on what Satan can do.", "options": ["True", "False"], "correct": 0, "fact": "Job 1:12; 2:6 — God gave Satan permission to test Job but said spare his life. God remained in sovereign control throughout Job suffering."}, {"type": "mc", "category": "✝️ New Testament", "question": "Which New Testament writer calls himself a prisoner of Christ Jesus in Philemon?", "options": ["James", "John", "Peter", "Paul"], "correct": 3, "fact": "Philemon 1:1 — Paul, a prisoner of Christ Jesus. Paul uses this phrase both literally (he was in prison) and theologically (he was bound to Christ service and mission)."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The word church in the New Testament comes from the Greek word ekklesia, meaning assembly.", "options": ["True", "False"], "correct": 0, "fact": "The Greek word ekklesia (from which we get ecclesia and ecclesiastical) means called out assembly. It refers to the gathering of believers who are called out by God to belong to Him."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "Which angel announced the birth of Jesus to Mary?", "options": ["Michael", "Raphael", "Gabriel", "Uriel"], "correct": 2, "fact": "Luke 1:26-28 — God sent the angel Gabriel to Nazareth, to a virgin pledged to be married to a man named Joseph. The virgin name was Mary."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: The Bible says the wise men (Magi) visited Jesus in the manger on the night of His birth.", "options": ["True", "False"], "correct": 1, "fact": "Matthew 2:11 says the Magi came to a house not a stable, and Herod order to kill boys up to 2 years old suggests the Magi arrived months or even up to 2 years after Jesus birth."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "What gifts did the wise men (Magi) bring to Jesus?", "options": ["Gold, silver, and spices", "Gold, frankincense, and myrrh", "Cloth, perfume, and gold", "Spices, oil, and incense"], "correct": 1, "fact": "Matthew 2:11 — They opened their treasures and presented him with gifts of gold, frankincense and myrrh. These symbolize kingship, priestly intercession, and suffering."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: Jesus was born in a manger because there was no room in the inn.", "options": ["True", "False"], "correct": 0, "fact": "Luke 2:7 — She wrapped him in cloths and placed him in a manger, because there was no guest room available for them. The word inn (katalyma) may actually mean a guest room."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "Who was the Roman emperor when Jesus was born?", "options": ["Nero", "Claudius", "Augustus", "Tiberius"], "correct": 2, "fact": "Luke 2:1 — In those days Caesar Augustus issued a decree that a census should be taken of the entire Roman world. This census brought Joseph and Mary to Bethlehem."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: An angel choir sang Glory to God in the highest to the shepherds.", "options": ["True", "False"], "correct": 0, "fact": "Luke 2:13-14 — A great company of the heavenly host appeared with the angel, praising God and saying, Glory to God in the highest heaven, and on earth peace to those on whom his favor rests."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "Where was Jesus family living before the journey to Bethlehem?", "options": ["Jerusalem", "Bethlehem", "Nazareth", "Capernaum"], "correct": 2, "fact": "Luke 1:26; 2:4 — Joseph and Mary lived in Nazareth in Galilee. They traveled to Bethlehem for the census because Joseph was of the house and lineage of David."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: Joseph was from the tribe of Judah and lineage of King David.", "options": ["True", "False"], "correct": 0, "fact": "Luke 2:4 — Joseph also went up from the town of Nazareth to Bethlehem the town of David, because he belonged to the house and line of David. This fulfilled Micah 5:2."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "What did the shepherds do after seeing the baby Jesus?", "options": ["Stayed with the family", "Spread the word about what they had heard and seen", "Offered sacrifices at the temple", "Followed the Magi"], "correct": 1, "fact": "Luke 2:17-18 — When they had seen him, they spread the word concerning what had been told them about this child, and all who heard it were amazed at what the shepherds said."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: King Herod was genuinely excited to worship the newborn king of the Jews.", "options": ["True", "False"], "correct": 1, "fact": "Matthew 2:7-8,16 — Herod secretly asked the Magi when the star appeared and told them to report back so he could worship Jesus — but he was actually plotting to kill the child."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "To which country did Joseph and Mary flee with Jesus to escape Herod?", "options": ["Babylon", "Syria", "Egypt", "Greece"], "correct": 2, "fact": "Matthew 2:13-14 — An angel warned Joseph in a dream to flee to Egypt. Matthew sees this as fulfilling Hosea 11:1: Out of Egypt I called my son."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: The prophetess Anna recognized Jesus as the Messiah when He was presented at the Temple.", "options": ["True", "False"], "correct": 0, "fact": "Luke 2:36-38 — Anna, an 84-year-old prophetess who never left the temple, gave thanks to God when she saw Jesus and spoke about the child to all who were looking for redemption."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "What does the name Jesus mean?", "options": ["Son of God", "God saves", "Prince of Peace", "Lamb of God"], "correct": 1, "fact": "Matthew 1:21 — You are to give him the name Jesus, because he will save his people from their sins. The name Jesus (Greek: Iesous) comes from the Hebrew Yeshua, meaning the Lord saves."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: The old man Simeon was told by the Holy Spirit he would not die before seeing the Lord Messiah.", "options": ["True", "False"], "correct": 0, "fact": "Luke 2:25-26 — It had been revealed to him by the Holy Spirit that he would not die before he had seen the Lord Messiah. When he saw Jesus, he took him in his arms and praised God."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "Isaiah 9:6 gives Jesus four names — which of the following is NOT one of them?", "options": ["Wonderful Counselor", "Prince of Peace", "Son of David", "Everlasting Father"], "correct": 2, "fact": "Isaiah 9:6 — For to us a child is born... And he will be called Wonderful Counselor, Mighty God, Everlasting Father, Prince of Peace. Son of David is a title from elsewhere in Scripture."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: Jesus is described as the Word made flesh in the Gospel of John.", "options": ["True", "False"], "correct": 0, "fact": "John 1:14 — The Word became flesh and made his dwelling among us. The Greek word Logos (Word) was a rich philosophical concept that John applies to the incarnate Jesus."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "What is the Magnificat?", "options": ["The angels song to the shepherds", "Mary song of praise to God upon learning she would bear the Messiah", "The song of the wise men", "The hymn sung at Jesus presentation at the Temple"], "correct": 1, "fact": "Luke 1:46-55 — When Mary visited Elizabeth, she sang: My soul glorifies the Lord and my spirit rejoices in God my Savior... It echoes Hannah prayer in 1 Samuel 2."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: The star that the Magi followed is called the Star of Bethlehem.", "options": ["True", "False"], "correct": 0, "fact": "Matthew 2:2 — The Magi said We saw his star when it rose and have come to worship him. The Bible calls it his star; the popular name Star of Bethlehem is a church tradition."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "Which prophet words did Matthew cite for the virgin birth?", "options": ["Jeremiah", "Micah", "Isaiah", "Zechariah"], "correct": 2, "fact": "Matthew 1:22-23 quotes Isaiah 7:14 directly: The virgin will conceive and give birth to a son, and they will call him Immanuel (which means God with us)."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: Joseph initially planned to divorce Mary quietly before the angel appeared to him.", "options": ["True", "False"], "correct": 0, "fact": "Matthew 1:19 — Because Joseph her husband was faithful to the law, and yet did not want to expose her to public disgrace, he had in mind to divorce her quietly. The angel revealed the truth."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "What does Advent mean?", "options": ["Birth", "Coming or arrival", "Celebration", "Light"], "correct": 1, "fact": "Advent comes from the Latin adventus meaning coming or arrival. The season of Advent marks anticipation of Christ first coming and expectation of His second coming."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: The wise men came from the East.", "options": ["True", "False"], "correct": 0, "fact": "Matthew 2:1 — After Jesus was born in Bethlehem, Magi from the east came to Jerusalem. Many scholars believe they came from Persia or Babylon."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "John 1:1 says In the beginning was the Word, and the Word was with God, and the Word was ___.", "options": ["Holy", "From God", "God", "Eternal"], "correct": 2, "fact": "John 1:1 — In the beginning was the Word, and the Word was with God, and the Word was God. This verse affirms both the distinctness of Jesus from the Father and His full deity."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: Luke account of Jesus birth focuses on the shepherds while Matthew focuses on the Magi.", "options": ["True", "False"], "correct": 0, "fact": "Luke 2 features the shepherds and the angels; Matthew 2 features the Magi and Herod. Together the accounts show Jesus significance to humble Jewish shepherds and wise Gentile seekers."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "What is the theological term for God becoming human in Jesus?", "options": ["Resurrection", "Ascension", "Incarnation", "Sanctification"], "correct": 2, "fact": "John 1:14 — The Word became flesh. Incarnation (from Latin in carne, meaning in the flesh) refers to the eternal Son of God taking on human nature — fully God and fully man."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: Herod ordered the killing of all boys in Bethlehem under two years old after the Magi visit.", "options": ["True", "False"], "correct": 0, "fact": "Matthew 2:16 — He gave orders to kill all the boys in Bethlehem and its vicinity who were two years old and under. This is called the Massacre of the Innocents."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "After returning from Egypt, where did Joseph settle his family?", "options": ["Bethlehem", "Jerusalem", "Nazareth", "Capernaum"], "correct": 2, "fact": "Matthew 2:23 — He went and lived in a town called Nazareth. So was fulfilled what was said through the prophets, that he would be called a Nazarene."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: Jesus birth fulfilled many Old Testament prophecies.", "options": ["True", "False"], "correct": 0, "fact": "Biblical scholars have identified many specific Messianic prophecies fulfilled by Jesus, including His birthplace (Micah 5:2), manner of birth (Isaiah 7:14), lineage (2 Samuel 7:12), and more."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "What is the significance of the myrrh given by the Magi?", "options": ["It symbolized Jesus kingship", "It was used in embalming, pointing to Jesus death and burial", "It represented priestly intercession", "It was simply a valuable spice"], "correct": 1, "fact": "Myrrh was used in burial preparations. John 19:39 notes that Nicodemus brought myrrh for Jesus burial. The Magi gift of myrrh foreshadowed the suffering and death of the Messiah."}, {"type": "tf", "category": "🌟 Christmas Story", "question": "True or False: The announcement to the shepherds is called the Gloria in Excelsis Deo.", "options": ["True", "False"], "correct": 0, "fact": "Luke 2:14 — Glory to God in the highest heaven (Gloria in excelsis Deo in Latin). This phrase has been set to music in countless hymns and liturgies throughout church history."}, {"type": "mc", "category": "🌟 Christmas Story", "question": "What role did the Holy Spirit play in Jesus conception?", "options": ["It proved Jesus was born sinless", "It showed God direct intervention in history", "Both A and B", "None of the above"], "correct": 2, "fact": "Matthew 1:20; Luke 1:35 — The Spirit role in the virgin birth means Jesus inherited no sin nature, was uniquely the Son of God, and was God direct intervention in human history — all simultaneously."}, {"type": "mc", "category": "🎆 New Year Eve", "question": "What does Revelation say about making all things new?", "options": ["The old must pass away first", "God says I am making everything new", "Only believers will see new things", "The new age begins at midnight"], "correct": 1, "fact": "Revelation 21:5 — He who was seated on the throne said, I am making everything new! This promise of renewal and restoration is the hope of all creation."}];

function getTodayIndex(){
  var n=new Date();var m=n.getMonth();var d=n.getDate();
  var dim=[31,29,31,30,31,30,31,31,30,31,30,31];
  var i=0;for(var x=0;x<m;x++)i+=dim[x];i+=(d-1);
  return Math.min(i,questions.length-1);
}
var todayIdx=getTodayIndex();
var currentOffset=0;

function applyPalette(p){
  var r=document.documentElement.style;
  r.setProperty('--card',p.card);
  r.setProperty('--text',p.text);
  r.setProperty('--accent',p.accent);
  r.setProperty('--green',p.green);
  r.setProperty('--red',p.red);
  r.setProperty('--muted',p.muted);
  r.setProperty('--border',p.border);
  r.setProperty('--pill',p.pill);
  var scrimEl=document.getElementById('scrim');if(scrimEl)scrimEl.style.background=p.card;
  var wrapper=document.querySelector('.wrapper');if(wrapper)wrapper.style.background='transparent';
  document.getElementById('question-card').style.background=p.card;
  document.getElementById('result-panel').style.background=p.card;
  var bb=document.querySelector('.bottom-bar');if(bb)bb.style.background=p.card;
  var hh=document.querySelector('.header');if(hh)hh.style.background=p.card;
  document.body.style.backgroundColor='transparent';
}

function loadDay(offset){
  var idx=Math.max(0,Math.min(questions.length-1,todayIdx+offset));
  var q=questions[idx];
  var pal=palettes[idx%10];
  applyPalette(pal);
  document.body.style.backgroundImage='url('+images[idx%10]+')';document.body.style.backgroundSize='cover';document.body.style.backgroundPosition='center';
  var d=new Date();d.setDate(d.getDate()+offset);
  document.getElementById('today-date').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  
  document.getElementById('q-category').textContent=q.category;
  document.getElementById('q-type-pill').textContent=q.type==='tf'?'True or False':'Multiple Choice';
  document.getElementById('q-text').textContent=q.question;
  var c=document.getElementById('answers-container');
  c.className=q.type==='tf'?'answers tf':'answers';
  c.innerHTML='';
  var L=['A','B','C','D'];
  var T=['\u2713','\u2717'];
  q.options.forEach(function(opt,i){
    var btn=document.createElement('button');
    btn.className='answer-btn pop-in';
    btn.style.animationDelay=(i*0.06)+'s';
    (function(ii){btn.onclick=function(){selectAnswer(ii,q);};})(i);
    var le=document.createElement('div');le.className='answer-letter';le.textContent=q.type==='tf'?T[i]:L[i];
    var te=document.createElement('div');te.className='answer-text';te.textContent=opt;
    var ie=document.createElement('div');ie.className='answer-icon';ie.textContent=i===q.correct?'\u2713':'\u2717';
    btn.appendChild(le);btn.appendChild(te);
    if(q.type!=='tf')btn.appendChild(ie);
    c.appendChild(btn);
  });
  var rp=document.getElementById('result-panel');
  rp.className='result-panel';
  document.getElementById('result-headline').textContent='';
  document.getElementById('result-fact').textContent='';
  document.getElementById('nav-prev').disabled=(offset<=-7);
  document.getElementById('nav-next').disabled=(offset>=0);
  var lbl=document.getElementById('nav-label');
  if(offset===0)lbl.textContent='TODAY';
  else if(offset===-1)lbl.textContent='YESTERDAY';
  else lbl.textContent=Math.abs(offset)+' DAYS AGO';
  var area2=document.getElementById('trivia-area');
  if(area2){
    area2.onscroll=updateFade;
  }
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(updateFade, 80);
}
function updateFade(){
  var area=document.getElementById('trivia-area');
  var fade=document.getElementById('fade-overlay');
  if(!area||!fade)return;
  var atBottom=area.scrollHeight-area.scrollTop<=area.clientHeight+8;
  var hasScroll=area.scrollHeight>area.clientHeight+8;
  var show=hasScroll&&!atBottom;
  fade.classList.toggle('visible',show);
  if(show){
    // Position: bottom of trivia-area, above bottom-bar
    var areaRect=area.getBoundingClientRect();
    var wrapRect=area.closest('.wrapper').getBoundingClientRect();
    var bottomBarH=document.querySelector('.bottom-bar').offsetHeight;
    fade.style.bottom=bottomBarH+'px';
    fade.style.height='72px';
    fade.style.background='linear-gradient(to bottom, transparent 0%, var(--card) 100%)';
  }
}


function navigate(dir){
  currentOffset=Math.min(0,Math.max(-7,currentOffset+dir));
  loadDay(currentOffset);
}

function selectAnswer(ci,q){
  var btns=document.querySelectorAll('.answer-btn');
  if(btns[0].classList.contains('answered'))return;
  var ok=ci===q.correct;
  btns.forEach(function(b,i){
    b.classList.add('answered');
    b.style.pointerEvents='none';
    if(i===ci&&ok){
      b.classList.add('correct');
      if(b.querySelector('.answer-icon'))b.querySelector('.answer-icon').textContent='\u2713';
    } else if(i===ci&&!ok){
      b.classList.add('wrong');
      if(b.querySelector('.answer-icon'))b.querySelector('.answer-icon').textContent='\u2717';
    } else if(i===q.correct&&!ok){
      b.classList.add('reveal-correct');
      if(b.querySelector('.answer-icon'))b.querySelector('.answer-icon').textContent='\u2713';
    } else {
      b.classList.add('dimmed');
    }
  });
  var p=document.getElementById('result-panel');
  var h=document.getElementById('result-headline');
  var f=document.getElementById('result-fact');
  if(ok){
    p.classList.add('show','correct-panel');
    h.className='result-headline correct-text';
    h.textContent='\u2705 Correct!';
  } else {
    p.classList.add('show','wrong-panel');
    h.className='result-headline wrong-text';
    h.textContent='\u274C Correct answer: '+q.options[q.correct];
  }
  f.textContent='\uD83D\uDCD6 '+q.fact;
  setTimeout(function(){p.scrollIntoView({behavior:'smooth',block:'start'});},100);
}

loadDay(0);

</script>
</body>
</html>
