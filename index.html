<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Daily Bible Trivia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--card:#f5efe0;--accent:#8b4513;--green:#2e7d32;--red:#b71c1c;--text:#2c1600;--muted:#7a6040;--border:rgba(139,69,19,0.18);--pill:rgba(139,69,19,0.11);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{margin:0;padding:0;width:100vw;height:100dvh;overflow:hidden;font-family:'DM Sans',sans-serif;background-color:#1a1208;background-size:cover;background-position:center;background-repeat:no-repeat;}
  .bg-layer{display:none;}
  .scrim{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:calc(100vw - 12vw);
    max-width:400px;
    height:calc(100dvh - 12vw - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
    max-height:calc(100dvh - 48px);
    border-radius:28px;
    z-index:1;
    background:var(--card);
  }
  .wrapper{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:calc(100vw - 12vw);
    max-width:400px;
    height:calc(100dvh - 12vw - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
    max-height:calc(100dvh - 48px);
    border-radius:28px;
    z-index:2;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    padding:0;
    background:transparent;
  }
  .fade-overlay{
    position:absolute;
    left:0;right:0;
    pointer-events:none;
    z-index:10;
    opacity:0;
    transition:opacity 0.3s ease;
  }
  .fade-overlay.visible{opacity:1;}
  .header{padding:28px 24px 0;display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--card);flex-shrink:0;position:relative;z-index:5;}
  .header-label{font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);}
  .header-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;text-align:center;line-height:1.1;color:var(--text);}
  .header-date{font-size:12px;color:var(--muted);margin-top:2px;}
  .divider{margin:20px 24px 0;height:1px;background:var(--border);flex-shrink:0;position:relative;z-index:5;}
  #trivia-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:8px;position:relative;}
  #trivia-area::-webkit-scrollbar{display:none;}
  .scroll-fade{
    display:none;
  }
  .fade-overlay::after{
    content:'';
    position:absolute;
    bottom:10px;
    left:50%;
    width:18px;height:18px;
    border-right:2px solid var(--muted);
    border-bottom:2px solid var(--muted);
    transform:translateX(-50%) rotate(45deg);
    opacity:0;
    transition:opacity 0.3s ease;
    animation:fadeBounce 1.2s ease-in-out infinite;
  }
  .fade-overlay.visible::after{opacity:0.55;}
  @keyframes fadeBounce{
    0%,100%{transform:translateX(-50%) rotate(45deg) translateY(0);}
    50%{transform:translateX(-50%) rotate(45deg) translateY(4px);}
  }
  .bottom-bar{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:12px 24px 16px;gap:8px;border-top:1px solid var(--border);background:var(--card);position:relative;z-index:5;}
  .category-row{padding:18px 24px 0;display:flex;align-items:center;gap:10px;}
  .category-badge{display:inline-flex;align-items:center;gap:6px;background:var(--pill);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);}
  .category-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
  .day-info{font-size:11px;color:var(--muted);margin-left:auto;font-weight:500;}
  .question-card{margin:16px 24px 0;border:1px solid var(--border);border-radius:20px;padding:24px;position:relative;overflow:hidden;background:var(--card);}
  .question-card::before{content:'†';position:absolute;right:-5px;top:-15px;font-size:110px;color:var(--accent);opacity:0.07;line-height:1;pointer-events:none;}
  .question-type-pill{display:inline-block;background:var(--pill);border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .question-text{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;line-height:1.45;color:var(--text);}
  .answers{margin:16px 24px 0;display:flex;flex-direction:column;gap:10px;}
  .answer-btn{width:100%;background:var(--pill);border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.18s ease;text-align:left;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  .answer-btn:active{transform:scale(0.98);}
  .answer-btn:not(.answered):hover{border-color:var(--accent);opacity:0.88;}
  .answer-letter{width:32px;height:32px;border-radius:8px;background:rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0;transition:all 0.18s ease;}
  .answer-text{font-size:15px;color:var(--text);line-height:1.35;flex:1;}
  .answer-icon{font-size:18px;opacity:0;flex-shrink:0;transition:opacity 0.2s ease;}
  .answer-btn.correct{border-color:var(--green);}
  .answer-btn.correct .answer-letter{background:var(--green);color:#fff;}
  .answer-btn.correct .answer-icon{opacity:1;color:var(--green);}
  .answer-btn.wrong{border-color:var(--red);opacity:0.75;}
  .answer-btn.wrong .answer-letter{background:var(--red);color:#fff;}
  .answer-btn.wrong .answer-icon{opacity:1;color:var(--red);}
  .answer-btn.reveal-correct{border-color:var(--green);opacity:0.85;}
  .answer-btn.reveal-correct .answer-letter{background:var(--green);color:#fff;}
  .answer-btn.reveal-correct .answer-icon{opacity:1;color:var(--green);}
  .answer-btn.dimmed{opacity:0.32;}
  .answers.tf{flex-direction:row;}
  .answers.tf .answer-btn{flex:1;flex-direction:column;align-items:center;justify-content:center;padding:22px 12px;gap:8px;text-align:center;}
  .answers.tf .answer-letter{width:44px;height:44px;border-radius:50%;font-size:18px;}
  .answers.tf .answer-text{font-size:14px;font-weight:600;text-align:center;}
  
  .result-panel{margin:16px 24px 0;border-radius:16px;padding:20px;display:none;flex-direction:column;gap:8px;animation:slideUp 0.3s ease;background:var(--card);}
  .result-panel.show{display:flex;}
  .result-panel.correct-panel{border:1px solid var(--green);}
  .result-panel.wrong-panel{border:1px solid var(--red);}
  .result-headline{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .result-headline.correct-text{color:var(--green);}
  .result-headline.wrong-text{color:var(--red);}
  .result-fact{font-size:14px;line-height:1.6;color:var(--text);opacity:0.85;font-weight:300;}
  .result-share{margin-top:8px;font-size:12px;color:var(--muted);font-style:italic;}
  .nav-bar{display:flex;align-items:center;justify-content:center;gap:18px;padding:0;width:100%;}
  .nav-btn{background:none;border:none;cursor:pointer;font-size:26px;color:var(--muted);padding:10px;border-radius:50%;transition:color 0.15s,opacity 0.15s;-webkit-tap-highlight-color:transparent;}
  .nav-btn:not(:disabled):hover{color:var(--accent);}
  .nav-btn:disabled{opacity:0.22;cursor:default;}
  .nav-label{font-size:15px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);min-width:110px;text-align:center;}
  .footer-link{text-align:center;font-size:13px;font-weight:500;color:var(--muted);letter-spacing:0.04em;}
  .footer-link a{color:var(--muted);text-decoration:none;}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  @keyframes popIn{from{transform:scale(0.92);opacity:0;}to{transform:scale(1);opacity:1;}}
  .pop-in{animation:popIn 0.25s ease forwards;}

  /* ── Scan Gate Expired Screen ── */
  #expired-screen{
    display:none;
    position:fixed;
    inset:0;
    z-index:9999;
    background:#ffffff;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    padding:60px 32px 48px;
    font-family:'DM Sans',sans-serif;
  }
  #expired-screen.show{display:flex;}
  .expired-logo{
    width:180px;
    height:auto;
  }
  .expired-message{
    font-family:'Playfair Display',serif;
    font-size:22px;
    font-weight:700;
    color:#1a1208;
    text-align:center;
    line-height:1.5;
    max-width:320px;
  }
  .expired-footer{
    font-size:15px;
    font-weight:600;
    color:#7a6040;
    text-align:center;
    letter-spacing:0.04em;
  }
  .expired-footer a{color:#7a6040;text-decoration:none;}
</style>
</head>

var questions=[{"type": "mc", "category": "📖 Genesis", "question": "What did God create on the first day?", "options": ["Sun and moon", "Light and darkness", "Sky and sea", "Animals"], "correct": 1, "fact": "Genesis 1:3 — God said Let there be light. The sun was not created until day four."}, {"type": "tf", "category": "📖 Genesis", "question": "True or False: Adam and Eve had three sons named Cain, Abel, and Seth.", "options": ["True", "False"], "correct": 0, "fact": "Genesis 4-5 names all three sons. Seth was born after Cain killed Abel to continue the godly line."}, {"type": "mc", "category": "📖 Genesis", "question": "What was the forbidden fruit in the Garden of Eden?", "options": ["An apple", "A fig", "Fruit of the Tree of Knowledge of Good and Evil", "A pomegranate"], "correct": 2, "fact": "The Bible never specifies the type of fruit, only that it came from the tree of the knowledge of good and evil (Genesis 2:17)."}, {"type": "tf", "category": "📖 Genesis", "question": "True or False: Noah ark was made of gopher wood.", "options": ["True", "False"], "correct": 0, "fact": "Genesis 6:14 specifies gopher wood, though scholars debate exactly what species this refers to today."}, {"type": "mc", "category": "📖 Genesis", "question": "How many days and nights did it rain during Noah flood?", "options": ["20", "40", "80", "100"], "correct": 1, "fact": "Genesis 7:12 — The rain fell forty days and forty nights, though the entire flood lasted much longer."}, {"type": "mc", "category": "📖 Genesis", "question": "What sign did God give as a covenant after the flood?", "options": ["A dove", "A burning bush", "A rainbow", "A pillar of cloud"], "correct": 2, "fact": "Genesis 9:13 — God placed a rainbow in the sky as a sign of His covenant never to flood the whole earth again."}, {"type": "tf", "category": "📖 Genesis", "question": "True or False: Abraham was originally named Abram.", "options": ["True", "False"], "correct": 0, "fact": "God changed his name from Abram (exalted father) to Abraham (father of many nations) in Genesis 17:5."}, {"type": "mc", "category": "📖 Genesis", "question": "How old was Abraham when Isaac was born?", "options": ["70", "90", "100", "110"], "correct": 2, "fact": "Genesis 21:5 — Abraham was a hundred years old when his son Isaac was born to him."}, {"type": "tf", "category": "📖 Genesis", "question": "True or False: Jacob and Esau were twins.", "options": ["True", "False"], "correct": 0, "fact": "Genesis 25:24 confirms they were twins. Esau came first, with Jacob grasping his heel — foreshadowing a lifetime of rivalry."}, {"type": "mc", "category": "📖 Genesis", "question": "What did Joseph brothers do with his coat of many colors?", "options": ["Burned it", "Sold it to merchants", "Gave it to their father", "Buried it"], "correct": 1, "fact": "Genesis 37:28 — Joseph brothers sold him to Ishmaelite traders for 20 pieces of silver, then dipped the coat in goat blood."}, {"type": "mc", "category": "📖 Genesis", "question": "How many sons did Jacob have?", "options": ["10", "12", "14", "11"], "correct": 1, "fact": "Jacob had 12 sons who became the 12 tribes of Israel: Reuben, Simeon, Levi, Judah, Dan, Naphtali, Gad, Asher, Issachar, Zebulun, Joseph, and Benjamin."}, {"type": "tf", "category": "📖 Genesis", "question": "True or False: Joseph was sold into slavery and eventually became second-in-command under Pharaoh.", "options": ["True", "False"], "correct": 0, "fact": "After years of hardship including false imprisonment, Joseph interpreted Pharaoh dreams and was appointed ruler over all Egypt (Genesis 41:40)."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Who was the first king of Israel?", "options": ["David", "Solomon", "Saul", "Samuel"], "correct": 2, "fact": "1 Samuel 10:1 — Saul was anointed by Samuel as Israel first king, though he later fell from favor due to disobedience."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Moses was born a Hebrew but raised as an Egyptian prince.", "options": ["True", "False"], "correct": 0, "fact": "Exodus 2 tells how Moses was placed in a basket on the Nile and found by Pharaoh daughter, who raised him in the royal palace."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What did Moses see burning but not consumed?", "options": ["A thornbush", "A cedar tree", "A fig tree", "An olive tree"], "correct": 0, "fact": "Exodus 3:2 — The angel of the Lord appeared in flames of fire from within a bush that burned but was not consumed."}, {"type": "mc", "category": "⚡ Old Testament", "question": "How many plagues did God send upon Egypt?", "options": ["7", "9", "10", "12"], "correct": 2, "fact": "The 10 plagues ranged from blood and frogs to darkness and finally the death of the firstborn, which led Pharaoh to release Israel."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The Israelites wandered in the wilderness for 40 years before entering the Promised Land.", "options": ["True", "False"], "correct": 0, "fact": "Numbers 14:33 — God declared 40 years of wandering as a consequence of Israel unbelief after the spies report."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What river did Israel cross to enter the Promised Land?", "options": ["The Nile", "The Euphrates", "The Jordan", "The Tigris"], "correct": 2, "fact": "Joshua 3 describes the miraculous crossing of the Jordan River, where God stopped the water so Israel could cross on dry ground."}, {"type": "mc", "category": "⚡ Old Testament", "question": "How did the walls of Jericho fall?", "options": ["A battering ram", "Marching, trumpets, and a shout", "An earthquake", "A direct attack"], "correct": 1, "fact": "Joshua 6 — They marched once daily for six days, seven times on the seventh, then trumpets and a shout. The walls collapsed miraculously."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Samson strength came from his uncut hair.", "options": ["True", "False"], "correct": 0, "fact": "Samson was a Nazirite from birth. His uncut hair was the sign of his vow to God, and Delilah betrayal cost him his strength (Judges 16)."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What weapon did David use to defeat Goliath?", "options": ["A sword", "A spear", "A sling and a stone", "His bare hands"], "correct": 2, "fact": "1 Samuel 17:49 — David struck Goliath in the forehead with a stone from his sling, then used Goliath own sword to finish the battle."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: King David wrote all 150 Psalms.", "options": ["True", "False"], "correct": 1, "fact": "David wrote many Psalms, but others were written by Asaph, the sons of Korah, Solomon, Moses (Psalm 90), and anonymous authors."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Who was Solomon mother?", "options": ["Michal", "Abigail", "Bathsheba", "Hannah"], "correct": 2, "fact": "2 Samuel 12:24 — Solomon was born to David and Bathsheba, the woman David had sinfully taken after sending her husband Uriah to his death."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What did Solomon ask for when God told him to make a request?", "options": ["Long life", "Wisdom", "Riches", "Military victory"], "correct": 1, "fact": "1 Kings 3:9 — Solomon asked for a discerning heart to govern the people and distinguish right from wrong, which pleased God greatly."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Elijah was taken to heaven in a whirlwind.", "options": ["True", "False"], "correct": 0, "fact": "2 Kings 2:11 — Elijah went up to heaven in a whirlwind, accompanied by a chariot and horses of fire, with Elisha watching."}, {"type": "mc", "category": "📜 Prophets", "question": "Which prophet was swallowed by a great fish?", "options": ["Elijah", "Isaiah", "Jonah", "Amos"], "correct": 2, "fact": "Jonah 1:17 — Jonah fled from God command to preach to Nineveh and was swallowed by a great fish for three days and three nights."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Isaiah prophesied the virgin birth of Jesus more than 700 years before it happened.", "options": ["True", "False"], "correct": 0, "fact": "Isaiah 7:14 — The virgin will conceive and give birth to a son, and will call him Immanuel. Matthew 1:22-23 identifies this as fulfilled in Jesus."}, {"type": "mc", "category": "📜 Prophets", "question": "Who was thrown into the lions den?", "options": ["Shadrach", "Elijah", "Daniel", "Ezekiel"], "correct": 2, "fact": "Daniel 6 — Daniel was thrown into the den for continuing to pray to God despite a royal decree, but God shut the lions mouths."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Shadrach, Meshach, and Abednego were thrown into a furnace seven times hotter than normal.", "options": ["True", "False"], "correct": 0, "fact": "Daniel 3:19 — King Nebuchadnezzar ordered the furnace heated seven times hotter. The three men survived and a fourth figure was seen inside."}, {"type": "mc", "category": "📜 Prophets", "question": "What is Jeremiah sometimes called?", "options": ["The Weeping Prophet", "The Laughing Prophet", "The Silent Prophet", "The Warrior Prophet"], "correct": 0, "fact": "Jeremiah is known as the Weeping Prophet for his deep sorrow over Jerusalem sin and destruction (Jeremiah 9:1)."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The book of Psalms is the longest book in the Bible by chapter count.", "options": ["True", "False"], "correct": 0, "fact": "Psalms has 150 chapters, making it the longest book in the Bible. Psalm 119 is also the longest single chapter."}, {"type": "mc", "category": "✝️ New Testament", "question": "In which city was Jesus born?", "options": ["Nazareth", "Jerusalem", "Bethlehem", "Capernaum"], "correct": 2, "fact": "Luke 2:4-7 — Joseph and Mary traveled to Bethlehem for the census, fulfilling Micah 5:2 that the Messiah would be born there."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Bible specifies that three wise men visited baby Jesus.", "options": ["True", "False"], "correct": 1, "fact": "The Bible never states the number of Magi. It only mentions three gifts (gold, frankincense, myrrh) in Matthew 2:11, leading to the popular assumption."}, {"type": "mc", "category": "✝️ New Testament", "question": "Who baptized Jesus?", "options": ["Peter", "Paul", "John the Baptist", "Philip"], "correct": 2, "fact": "Matthew 3:13-17 — John baptized Jesus in the Jordan River, and the Holy Spirit descended like a dove as God voice said This is my Son."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Jesus fasted for 40 days in the wilderness before beginning His public ministry.", "options": ["True", "False"], "correct": 0, "fact": "Matthew 4:1-2 — Jesus was led by the Spirit into the wilderness where He fasted 40 days and 40 nights, then was tempted by the devil."}, {"type": "mc", "category": "✝️ New Testament", "question": "What was Jesus first miracle according to the Gospel of John?", "options": ["Healing a blind man", "Walking on water", "Turning water into wine", "Feeding 5,000 people"], "correct": 2, "fact": "John 2:1-11 — At a wedding in Cana, Jesus turned six stone jars of water into wine at His mother Mary request."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Jesus chose 12 disciples.", "options": ["True", "False"], "correct": 0, "fact": "Matthew 10:1-4 lists the 12 apostles. The number mirrors the 12 tribes of Israel, symbolizing a new covenant community."}, {"type": "mc", "category": "✝️ New Testament", "question": "What was the occupation of Peter, Andrew, James, and John before following Jesus?", "options": ["Carpenters", "Tax collectors", "Fishermen", "Shepherds"], "correct": 2, "fact": "Matthew 4:18-22 — Jesus called these four brothers from their fishing nets with the words Follow me, and I will make you fishers of men."}, {"type": "mc", "category": "✝️ New Testament", "question": "Which disciple betrayed Jesus for 30 pieces of silver?", "options": ["Thomas", "Judas Iscariot", "Peter", "Bartholomew"], "correct": 1, "fact": "Matthew 26:15 — Judas agreed to betray Jesus to the chief priests for 30 silver coins, the price of a slave under Mosaic law."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Jesus delivered the Sermon on the Mount while standing on a plain.", "options": ["True", "False"], "correct": 1, "fact": "Matthew 5:1 says Jesus went up a mountain. Luke parallel account (6:17) mentions a level place, but the sermon is associated with a mountain."}, {"type": "mc", "category": "✝️ New Testament", "question": "What are the first two words of the Lord Prayer as taught by Jesus?", "options": ["Lord God", "Heavenly Father", "Our Father", "Dear Father"], "correct": 2, "fact": "Matthew 6:9 — Our Father in heaven, hallowed be your name. Jesus taught this model prayer when asked how to pray."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Jesus walked on water, and Peter briefly walked on water too.", "options": ["True", "False"], "correct": 0, "fact": "Matthew 14:28-31 — Peter stepped out of the boat and walked toward Jesus but began to sink when he took his eyes off Jesus and looked at the waves."}, {"type": "mc", "category": "✝️ New Testament", "question": "How many loaves of bread did Jesus use to feed the 5,000?", "options": ["2", "5", "7", "12"], "correct": 1, "fact": "Matthew 14:17 — A boy had five loaves and two fish. After Jesus blessed them, 12 baskets of leftovers remained after 5,000 men were fed."}, {"type": "mc", "category": "✝️ New Testament", "question": "What did Jesus say is the greatest commandment?", "options": ["Do not murder", "Honor your father and mother", "Love the Lord your God with all your heart", "Keep the Sabbath holy"], "correct": 2, "fact": "Matthew 22:37-39 — Jesus said the greatest commandment is to love God completely, and the second is to love your neighbor as yourself."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Parable of the Prodigal Son is found in the Gospel of John.", "options": ["True", "False"], "correct": 1, "fact": "The Parable of the Prodigal Son is found in Luke 15:11-32, part of a trilogy of parables about lost things — a sheep, a coin, and a son."}, {"type": "mc", "category": "✝️ New Testament", "question": "In the Parable of the Good Samaritan, who first passed by the injured man?", "options": ["A Pharisee and a scribe", "A priest and a Levite", "A soldier and a merchant", "Two disciples"], "correct": 1, "fact": "Luke 10:31-32 — A priest and then a Levite passed by on the other side, making the contrast with the compassionate Samaritan striking."}, {"type": "mc", "category": "✝️ New Testament", "question": "How many days was Lazarus in the tomb before Jesus raised him?", "options": ["1", "2", "3", "4"], "correct": 3, "fact": "John 11:39 — Martha said by this time there is a bad odor, for he has been there four days. Jesus raised him anyway, demonstrating power over death."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Transfiguration of Jesus involved Moses and Elijah appearing with Him.", "options": ["True", "False"], "correct": 0, "fact": "Matthew 17:1-3 — On a high mountain, Jesus was transfigured before Peter, James, and John, and Moses and Elijah appeared talking with Him."}, {"type": "mc", "category": "✝️ New Testament", "question": "What did Jesus ride into Jerusalem on during His triumphal entry?", "options": ["A horse", "A camel", "A donkey", "A white stallion"], "correct": 2, "fact": "Matthew 21:5 — Jesus rode a donkey, fulfilling Zechariah 9:9: See, your king comes to you, gentle and riding on a donkey."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Last Supper was a Passover meal.", "options": ["True", "False"], "correct": 0, "fact": "Matthew 26:17-19 — Jesus sent disciples to prepare the Passover. The meal connects Jesus as the sacrificial Lamb with Israel deliverance from Egypt."}, {"type": "mc", "category": "✝️ New Testament", "question": "In Gethsemane, Jesus asked His disciples to do what?", "options": ["Pray", "Guard the gate", "Prepare food", "Sing psalms"], "correct": 0, "fact": "Matthew 26:38 — Jesus said Watch and pray so that you will not fall into temptation, yet the disciples fell asleep three times."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Pontius Pilate found no guilt in Jesus but condemned Him anyway.", "options": ["True", "False"], "correct": 0, "fact": "John 18:38 — Pilate declared I find no basis for a charge against him, yet yielded to the crowd pressure and handed Jesus over to be crucified."}, {"type": "mc", "category": "✝️ New Testament", "question": "What was written on the sign on Jesus cross?", "options": ["King of the World", "Jesus of Nazareth, King of the Jews", "Behold the Man", "Son of God"], "correct": 1, "fact": "John 19:19 — Pilate had a sign placed reading Jesus of Nazareth, the King of the Jews, written in Aramaic, Latin, and Greek."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Jesus rose from the dead on the third day.", "options": ["True", "False"], "correct": 0, "fact": "1 Corinthians 15:4 — He was raised on the third day according to the Scriptures. This resurrection is the cornerstone of Christian faith."}, {"type": "mc", "category": "✝️ New Testament", "question": "Who was the first person to discover the empty tomb?", "options": ["Peter", "Mary Magdalene", "John", "All disciples together"], "correct": 1, "fact": "John 20:1 — Mary Magdalene came to the tomb early and found the stone rolled away. She then ran to tell Peter and John."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Jesus appeared to more than 500 people after His resurrection.", "options": ["True", "False"], "correct": 0, "fact": "1 Corinthians 15:6 — Paul writes that the risen Jesus appeared to more than 500 brothers and sisters at the same time."}, {"type": "mc", "category": "✝️ New Testament", "question": "Where did Jesus ascend into heaven?", "options": ["Jerusalem", "Galilee", "Bethlehem", "The Mount of Olives"], "correct": 3, "fact": "Acts 1:9-12 — Jesus ascended from the Mount of Olives, and two angels appeared saying He would return in the same way."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Thomas doubted the resurrection until he touched Jesus wounds.", "options": ["True", "False"], "correct": 0, "fact": "John 20:24-28 — Thomas said he would not believe unless he saw and touched the wounds. Jesus appeared and invited Thomas, who declared My Lord and my God!"}, {"type": "mc", "category": "✝️ New Testament", "question": "What happened on the Day of Pentecost?", "options": ["Jesus rose from the dead", "The disciples received the Holy Spirit", "Paul was converted", "The Temple was destroyed"], "correct": 1, "fact": "Acts 2:1-4 — The Holy Spirit came like a rushing wind and tongues of fire. Peter preached and 3,000 were baptized that day."}, {"type": "mc", "category": "🗓️ Leap Day Special", "question": "Which biblical figure lived 969 years — the longest recorded in the Bible?", "options": ["Adam", "Noah", "Abraham", "Methuselah"], "correct": 3, "fact": "Genesis 5:27 — Methuselah lived 969 years. He died the same year as the great flood, and his name may mean his death shall bring judgment."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What did God part so Israel could escape Egypt?", "options": ["The Jordan River", "The Red Sea", "The Nile River", "The Mediterranean Sea"], "correct": 1, "fact": "Exodus 14:21 — God drove back the sea with a strong east wind all night, making dry ground so Israel could walk through."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The Ten Commandments were given to Moses on Mount Sinai.", "options": ["True", "False"], "correct": 0, "fact": "Exodus 19-20 — God called Moses up to Mount Sinai and spoke the Ten Commandments, then gave him two stone tablets written by God own finger."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What food did God provide for the Israelites in the wilderness?", "options": ["Quail alone", "Manna alone", "Both manna and quail", "Fish from the sea"], "correct": 2, "fact": "Exodus 16 — God provided manna (bread from heaven) each morning and quail in the evenings to feed the Israelites during their wilderness years."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Joshua was Moses successor as leader of Israel.", "options": ["True", "False"], "correct": 0, "fact": "Deuteronomy 31:7-8 — Moses commissioned Joshua before all Israel, and God told Joshua Be strong and courageous as he prepared to lead the people into Canaan."}, {"type": "mc", "category": "✝️ New Testament", "question": "What did Jesus say to the storm on the Sea of Galilee?", "options": ["Peace, be still", "Stop and be calm", "Enough, be quiet", "Cease your fury"], "correct": 0, "fact": "Mark 4:39 — Jesus rebuked the wind and said Peace! Be still! The wind ceased and there was a great calm, amazing the disciples."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "Which book of the Bible begins In the beginning was the Word?", "options": ["Genesis", "Matthew", "Romans", "John"], "correct": 3, "fact": "John 1:1 — This opening parallels Genesis 1:1, identifying Jesus as the eternal Word (Logos) who was with God and was God from the beginning."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The book of Job is considered one of the oldest books in the Bible.", "options": ["True", "False"], "correct": 0, "fact": "Many scholars believe Job is among the oldest texts in the Bible, possibly predating Moses. It deals with suffering, faith, and God sovereignty."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What did Gideon do to test if God was calling him?", "options": ["Lit a fire on an altar", "Put out a fleece of wool", "Fasted for seven days", "Prayed at the tabernacle"], "correct": 1, "fact": "Judges 6:37-40 — Gideon put a fleece of wool out and asked God to make the fleece wet with dew while the ground stayed dry, then reversed the test."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Ruth was the great-grandmother of King David.", "options": ["True", "False"], "correct": 0, "fact": "Ruth 4:17-22 — Ruth bore Obed, who was the father of Jesse, who was the father of David. Ruth faithfulness placed her in the lineage of Jesus."}, {"type": "mc", "category": "✝️ New Testament", "question": "Blessed are the meek, for they shall inherit the ___.", "options": ["Kingdom of heaven", "Earth", "Eternal life", "Peace"], "correct": 1, "fact": "Matthew 5:5 — This is one of the eight Beatitudes. Meekness is strength under control, not weakness."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Apostle Paul wrote more books of the New Testament than any other author.", "options": ["True", "False"], "correct": 0, "fact": "Paul wrote 13 epistles (Romans through Philemon). John wrote 5 and Luke wrote 2, making Paul the most prolific NT author."}, {"type": "mc", "category": "📜 Prophets", "question": "In which book does For I know the plans I have for you appear?", "options": ["Isaiah", "Proverbs", "Jeremiah", "Psalms"], "correct": 2, "fact": "Jeremiah 29:11 — God spoke these words to the exiles in Babylon, promising them a future and a hope even in difficult circumstances."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The walls of Jericho fell because Israel attacked them with battering rams.", "options": ["True", "False"], "correct": 1, "fact": "Joshua 6 — The walls fell after Israel marched, blew trumpets, and shouted. It was entirely a miracle of God, not military force."}, {"type": "mc", "category": "✝️ New Testament", "question": "Which disciple denied Jesus three times?", "options": ["James", "John", "Peter", "Thomas"], "correct": 2, "fact": "Matthew 26:69-75 — Peter denied knowing Jesus three times before the rooster crowed, just as Jesus had predicted. Peter wept bitterly afterward."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "How many books are in the Protestant Bible?", "options": ["60", "66", "72", "73"], "correct": 1, "fact": "Protestant Bibles contain 66 books — 39 in the Old Testament and 27 in the New Testament."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Malachi is the last book of the Old Testament.", "options": ["True", "False"], "correct": 0, "fact": "Malachi is the final book of the Old Testament in most Protestant Bibles. It ends with a promise of Elijah return before the Day of the Lord."}, {"type": "mc", "category": "✝️ New Testament", "question": "What does the name Emmanuel (Immanuel) mean?", "options": ["Savior of the world", "God is mighty", "God with us", "Lord of lords"], "correct": 2, "fact": "Matthew 1:23 — The name Immanuel, fulfilled in Jesus, means God with us. It was first prophesied in Isaiah 7:14."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The Tower of Babel was built to reach God in heaven.", "options": ["True", "False"], "correct": 0, "fact": "Genesis 11:4 — The people said Come, let us build a tower that reaches to the heavens. God confused their language in response."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "Which New Testament letter is shortest by verse count?", "options": ["Philemon", "2 John", "3 John", "Jude"], "correct": 2, "fact": "3 John has only 15 verses, making it the shortest book in the New Testament by verse count."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The four Gospels are Matthew, Mark, Luke, and Acts.", "options": ["True", "False"], "correct": 1, "fact": "The four Gospels are Matthew, Mark, Luke, and John. Acts is a separate book by Luke continuing the story of the early church."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Which judge of Israel had 70 sons?", "options": ["Samson", "Gideon", "Deborah", "Jephthah"], "correct": 1, "fact": "Judges 8:30 — Gideon had 70 sons by his many wives, plus a son named Abimelech by a concubine."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: The prophet Amos was a shepherd before God called him.", "options": ["True", "False"], "correct": 0, "fact": "Amos 1:1 and 7:14 — Amos identified himself as a shepherd and tender of sycamore-fig trees from Tekoa. He was not a trained prophet."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What is the first verse of Psalm 23?", "options": ["The earth is the Lord and everything in it", "The Lord is my shepherd, I lack nothing", "God is our refuge and strength", "Praise the Lord, O my soul"], "correct": 1, "fact": "Psalm 23:1 — David wrote this beloved psalm from his experience as a shepherd, describing God tender care for His people."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Jesus was tempted in all ways as we are, yet was without sin.", "options": ["True", "False"], "correct": 0, "fact": "Hebrews 4:15 — We do not have a high priest who is unable to empathize with our weaknesses, but one who has been tempted in every way — yet he did not sin."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What language was most of the Old Testament originally written in?", "options": ["Latin", "Greek", "Hebrew", "Aramaic"], "correct": 2, "fact": "Most of the Old Testament was written in Biblical Hebrew, with small sections in Aramaic (Daniel 2-7, Ezra 4-7)."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Queen Esther risked her life to save the Jewish people from genocide.", "options": ["True", "False"], "correct": 0, "fact": "Esther 4:16 — Esther said If I perish, I perish, then approached the king uninvited to expose Haman plot against the Jews."}, {"type": "mc", "category": "✝️ New Testament", "question": "Which apostle was a tax collector before following Jesus?", "options": ["Peter", "James", "Matthew", "Philip"], "correct": 2, "fact": "Matthew 9:9 — Jesus saw Matthew sitting at the tax collector booth and said Follow me. Matthew immediately got up and followed."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Isaiah 53 is quoted or referenced many times in the New Testament.", "options": ["True", "False"], "correct": 0, "fact": "Isaiah 53 is quoted or referenced more than 40 times in the New Testament, applied directly to Jesus suffering, death, and atonement for sin."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What did God command Abraham to sacrifice, only to stop him and provide a ram?", "options": ["His servant", "His flock", "His son Isaac", "His wealth"], "correct": 2, "fact": "Genesis 22 — Abraham obeyed and was about to sacrifice Isaac when the angel of the Lord stopped him. This event is called the Akedah (binding of Isaac)."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Ezekiel prophesied to the exiles in Babylon.", "options": ["True", "False"], "correct": 0, "fact": "Ezekiel 1:1-3 — Ezekiel received his visions while among the Jewish exiles by the Kebar River in Babylon, where he ministered for over 20 years."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What is the middle book of the Bible?", "options": ["Psalms", "Proverbs", "Ezekiel", "Micah"], "correct": 0, "fact": "Psalms is the middle book of the 66-book Protestant Bible. Psalm 117, the shortest chapter, is also near the center of the entire Bible."}, {"type": "mc", "category": "✝️ New Testament", "question": "What day of the week did Jesus rise from the dead?", "options": ["Saturday", "Sunday", "Monday", "Friday"], "correct": 1, "fact": "Matthew 28:1 — After the Sabbath, at dawn on the first day of the week, the women went to the tomb and found it empty. Christians worship on Sunday because of this."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Jesus was crucified at a place called Golgotha.", "options": ["True", "False"], "correct": 0, "fact": "Matthew 27:33 — Golgotha means the place of the skull in Aramaic. In Latin it is Calvary, and it was just outside Jerusalem walls."}, {"type": "mc", "category": "✝️ New Testament", "question": "What happened to the Temple veil when Jesus died?", "options": ["It caught fire", "It was torn from top to bottom", "Priests cut it in two", "Nothing happened to it"], "correct": 1, "fact": "Matthew 27:50-51 — At the moment Jesus died, the curtain of the Temple was torn from top to bottom, symbolizing open access to God for all people."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Apostle Paul definitively wrote the book of Hebrews.", "options": ["True", "False"], "correct": 1, "fact": "Hebrews is anonymous in the manuscript tradition. Candidates include Paul, Apollos, Barnabas, or Priscilla. Most scholars do not attribute it to Paul."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Which king had the prophet Elijah confront over worshipping Baal?", "options": ["Saul", "Solomon", "Ahab", "Jeroboam"], "correct": 2, "fact": "1 Kings 18 — Elijah challenged King Ahab and the 450 prophets of Baal to a contest on Mount Carmel, where God answered by fire."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does the word Gospel mean?", "options": ["Holy book", "Good news", "Sacred story", "God word"], "correct": 1, "fact": "Gospel comes from the Greek euangelion, meaning good news. The good news is that Jesus died for sins and rose again, offering free salvation."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Justification by faith is a major theme in Paul letter to the Romans.", "options": ["True", "False"], "correct": 0, "fact": "Romans 1:17 — The righteous will live by faith. Romans is Paul most systematic explanation of salvation by grace through faith, not works."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Who was the mother of Samuel?", "options": ["Ruth", "Naomi", "Hannah", "Miriam"], "correct": 2, "fact": "1 Samuel 1 — Hannah wept and prayed desperately for a child. God answered, and she dedicated her son Samuel to the Lord service from childhood."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The Beatitudes are found in the book of Acts.", "options": ["True", "False"], "correct": 1, "fact": "The Beatitudes (Blessed are...) are found in Matthew 5:3-12 as part of the Sermon on the Mount. A parallel passage appears in Luke 6:20-22."}, {"type": "mc", "category": "✝️ New Testament", "question": "According to John 3:16, what did God give because He loved the world?", "options": ["The Law", "His only Son", "His Spirit", "Eternal peace"], "correct": 1, "fact": "John 3:16 — For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: King David was called a man after God own heart.", "options": ["True", "False"], "correct": 0, "fact": "1 Samuel 13:14 and Acts 13:22 — Despite serious sins, David genuine repentance showed his heart orientation toward God."}, {"type": "mc", "category": "✝️ New Testament", "question": "What is the first fruit of the Spirit listed in Galatians 5?", "options": ["Peace", "Joy", "Love", "Patience"], "correct": 2, "fact": "Galatians 5:22 — Love heads the list: The fruit of the Spirit is love, joy, peace, forbearance, kindness, goodness, faithfulness, gentleness and self-control."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Micah prophesied that the Messiah would be born in Bethlehem.", "options": ["True", "False"], "correct": 0, "fact": "Micah 5:2 — But you, Bethlehem Ephrathah... out of you will come for me one who will be ruler over Israel. Matthew 2:6 applies this to Jesus."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does the Hebrew word Shalom mean?", "options": ["Praise", "Victory", "Peace and wholeness", "Blessing"], "correct": 2, "fact": "Shalom is a rich Hebrew word encompassing peace, wholeness, completeness, and wellbeing. It is far deeper than the mere absence of conflict."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Revelation was written by John while exiled on the island of Patmos.", "options": ["True", "False"], "correct": 0, "fact": "Revelation 1:9 — John identifies himself as writing from Patmos, an island in the Aegean Sea where he was exiled under Roman persecution."}, {"type": "mc", "category": "⚡ Old Testament", "question": "How many years did Solomon reign as king of Israel?", "options": ["20", "30", "40", "50"], "correct": 2, "fact": "1 Kings 11:42 — Solomon reigned 40 years in Jerusalem. His reign was Israel golden age of peace and prosperity."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Apostle John was at the cross during Jesus crucifixion.", "options": ["True", "False"], "correct": 0, "fact": "John 19:26-27 — John was at the cross along with Mary (Jesus mother), Mary Magdalene, and other women. Most male disciples had fled."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What is the shortest verse in the Bible?", "options": ["God is love", "Jesus wept", "Be still", "Fear not"], "correct": 1, "fact": "John 11:35 — Jesus wept. These two words show Jesus deep compassion at Lazarus tomb, even though He was about to raise him from the dead."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The Ark of the Covenant contained the Ten Commandments, Aaron rod, and a jar of manna.", "options": ["True", "False"], "correct": 0, "fact": "Hebrews 9:4 — The ark contained the gold jar of manna, Aaron staff that had budded, and the stone tablets of the covenant."}, {"type": "mc", "category": "✝️ New Testament", "question": "In what form did the Holy Spirit descend at Jesus baptism?", "options": ["A cloud", "A dove", "A flame", "A rushing wind"], "correct": 1, "fact": "Luke 3:22 — The Holy Spirit descended on him in bodily form like a dove. This Trinitarian moment shows Father (voice), Son (Jesus), and Spirit (dove) together."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: The prophet Nahum wrote about the fall of Nineveh.", "options": ["True", "False"], "correct": 0, "fact": "The book of Nahum is entirely focused on God judgment against Nineveh, the Assyrian capital — the same city Jonah had preached to generations earlier."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What was the name of the high priest servant whose ear Peter cut off?", "options": ["Malchus", "Caiaphas", "Annas", "Barabbas"], "correct": 0, "fact": "John 18:10 — Simon Peter cut off the right ear of Malchus. Jesus healed the man (Luke 22:51) and rebuked Peter."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Stephen was the first Christian martyr recorded in the Bible.", "options": ["True", "False"], "correct": 0, "fact": "Acts 7:59-60 — Stephen was stoned to death after his speech to the Sanhedrin. Saul (later Paul) witnessed and approved of his execution."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "Which book of the Bible is known as a love poem?", "options": ["Ruth", "Lamentations", "Song of Solomon", "Esther"], "correct": 2, "fact": "The Song of Solomon is a lyric poem celebrating romantic love. It is also read as an allegory of God love for Israel."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The tribe of Levi received no land inheritance in Canaan.", "options": ["True", "False"], "correct": 0, "fact": "Numbers 18:20 — The Levites were set apart for priestly service and received 48 cities scattered among other tribes rather than a land inheritance."}, {"type": "mc", "category": "✝️ New Testament", "question": "What did Paul and Silas do while imprisoned in Philippi?", "options": ["Slept", "Prayed and sang hymns", "Planned an escape", "Fasted"], "correct": 1, "fact": "Acts 16:25 — About midnight Paul and Silas were praying and singing hymns to God. An earthquake opened the doors, and the jailer household was saved."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The Bible was originally divided into chapters and verses by its authors.", "options": ["True", "False"], "correct": 1, "fact": "Chapter divisions were added by Stephen Langton around 1227 AD. Verse numbers were added by Robert Estienne in 1551. The original manuscripts had no such divisions."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Who interpreted the handwriting on the wall for King Belshazzar?", "options": ["Ezekiel", "Shadrach", "Daniel", "Nehemiah"], "correct": 2, "fact": "Daniel 5:24-28 — The mysterious words Mene, Mene, Tekel, Parsin foretold Belshazzar downfall. That very night he was killed."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Corinth received more letters from Paul than any other church.", "options": ["True", "False"], "correct": 0, "fact": "Paul wrote at least two canonical letters to Corinth (1 & 2 Corinthians) and likely additional correspondence mentioned in the letters themselves."}, {"type": "mc", "category": "📜 Prophets", "question": "Which prophet was told to eat a scroll in his vision?", "options": ["Isaiah", "Jeremiah", "Ezekiel", "Hosea"], "correct": 2, "fact": "Ezekiel 3:1-3 — God told Ezekiel to eat a scroll, which tasted sweet as honey. Ezekiel was then sent to speak God words to rebellious Israel."}, {"type": "mc", "category": "✝️ New Testament", "question": "Before following Jesus, what was Matthew profession?", "options": ["Fisherman", "Carpenter", "Tax collector", "Soldier"], "correct": 2, "fact": "Matthew 9:9 — Matthew (also called Levi) collected taxes at the tax booth. Tax collectors were despised for collaborating with Rome."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Joseph was sold to Potiphar, the captain of Pharaoh guard.", "options": ["True", "False"], "correct": 0, "fact": "Genesis 39:1 — The Ishmaelites sold Joseph to Potiphar. Joseph served faithfully until Potiphar wife falsely accused him, landing him in prison."}, {"type": "mc", "category": "✝️ New Testament", "question": "Who replaced Judas Iscariot among the twelve apostles?", "options": ["Paul", "Barnabas", "Matthias", "Stephen"], "correct": 2, "fact": "Acts 1:26 — The disciples cast lots and Matthias was chosen to replace Judas. He had been with Jesus from John baptism through the resurrection."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The Epistles are letters written to early Christian communities.", "options": ["True", "False"], "correct": 0, "fact": "The 21 epistles (Romans through Jude) are letters addressing theology, practical Christian living, and specific church problems in early Christian communities."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Which judge of Israel was a woman?", "options": ["Miriam", "Deborah", "Esther", "Rahab"], "correct": 1, "fact": "Judges 4-5 — Deborah was both a prophetess and judge of Israel. She summoned Barak to lead Israel army and accompanied him into battle."}, {"type": "mc", "category": "✝️ New Testament", "question": "Where was Paul when he had a vision calling him to Macedonia?", "options": ["Jerusalem", "Antioch", "Troas", "Athens"], "correct": 2, "fact": "Acts 16:9 — Paul had a vision of a man from Macedonia saying Come help us. This led the gospel into Europe for the first time."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Joseph revealed himself to his brothers during their second visit to Egypt.", "options": ["True", "False"], "correct": 0, "fact": "Genesis 45:1-3 — Joseph could no longer control himself and wept as he revealed himself: I am Joseph! Is my father still living?"}, {"type": "mc", "category": "📜 Prophets", "question": "Which minor prophet wrote about locusts as a symbol of judgment?", "options": ["Amos", "Joel", "Obadiah", "Micah"], "correct": 1, "fact": "Joel 1 describes a devastating locust plague as a sign of judgment. Peter quoted Joel 2 on the Day of Pentecost (Acts 2:17)."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Apostle Paul was born a Roman citizen.", "options": ["True", "False"], "correct": 0, "fact": "Acts 22:28 — Paul declared he was born a Roman citizen, which gave him legal protections he used strategically throughout his ministry."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What was the name of the woman who betrayed Samson?", "options": ["Jezebel", "Delilah", "Tamar", "Zipporah"], "correct": 1, "fact": "Judges 16:4 — Delilah was paid by Philistine leaders to discover Samson strength. After persistent nagging, Samson revealed it was his uncut hair."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The book of Acts covers roughly 30 years of early church history.", "options": ["True", "False"], "correct": 0, "fact": "Acts spans from Jesus ascension (c. AD 30) to Paul imprisonment in Rome (c. AD 62), covering roughly 30 years of early church history."}, {"type": "mc", "category": "✝️ New Testament", "question": "What was the name of the synagogue ruler whose daughter Jesus raised from the dead?", "options": ["Nicodemus", "Jairus", "Simon", "Bartimaeus"], "correct": 1, "fact": "Mark 5:22 — Jairus fell at Jesus feet begging Him to heal his daughter. While they traveled, news came she had died, but Jesus said She is not dead, but asleep."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The Israelites were enslaved in Egypt for exactly 400 years.", "options": ["True", "False"], "correct": 1, "fact": "Genesis 15:13 says 400 years; Exodus 12:40-41 says 430 years. Scholars reconcile these differently. The number 400 may be a round figure."}, {"type": "mc", "category": "📜 Prophets", "question": "Who was the prophet sent to King David to confront him about Bathsheba?", "options": ["Samuel", "Elijah", "Nathan", "Gad"], "correct": 2, "fact": "2 Samuel 12 — Nathan told David a parable about a rich man stealing a poor man lamb, then declared You are the man! David repented, writing Psalm 51."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Galatians addresses circumcision as a requirement for salvation.", "options": ["True", "False"], "correct": 0, "fact": "Galatians 2:16 — Paul strongly argues that no one is justified by works of the law but by faith in Christ. Circumcision is not required for Gentile believers."}, {"type": "tf", "category": "📖 Bible Knowledge", "question": "True or False: The word Trinity appears in the Bible.", "options": ["True", "False"], "correct": 1, "fact": "The word Trinity is not found in the Bible, but the concept is supported by many passages showing three distinct persons sharing one divine nature (e.g., Matthew 28:19)."}, {"type": "mc", "category": "✝️ New Testament", "question": "Which book describes the seven letters to the seven churches?", "options": ["Acts", "Hebrews", "Revelation", "1 Peter"], "correct": 2, "fact": "Revelation 2-3 — Jesus dictated letters to the churches of Ephesus, Smyrna, Pergamum, Thyatira, Sardis, Philadelphia, and Laodicea."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Nehemiah oversaw the rebuilding of Jerusalem walls.", "options": ["True", "False"], "correct": 0, "fact": "Nehemiah organized the rebuilding of the city walls in just 52 days (Nehemiah 6:15) after returning from Persia with the king permission."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What is the meaning of Hallelujah?", "options": ["God is great", "Praise the Lord", "Bless the Lord", "Amen"], "correct": 1, "fact": "Hallelujah combines hallel (praise) and Yah (a form of Yahweh). It means Praise the Lord and appears frequently in Psalms and Revelation."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Jesus raised three people from the dead in the Gospel accounts.", "options": ["True", "False"], "correct": 0, "fact": "Jesus raised Jairus daughter (Mark 5), the widow son at Nain (Luke 7), and Lazarus (John 11) — demonstrating His power over death."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Which judge defeated the Midianites with just 300 men?", "options": ["Samson", "Jephthah", "Gideon", "Othniel"], "correct": 2, "fact": "Judges 7 — God whittled Gideon army from 32,000 to 300 so Israel would not boast. They defeated the Midianites with torches, jars, and trumpets."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: The prophet Hosea was commanded to marry an unfaithful woman.", "options": ["True", "False"], "correct": 0, "fact": "Hosea 1:2 — God commanded Hosea to marry Gomer, who was unfaithful. This served as a living picture of Israel spiritual unfaithfulness to God."}, {"type": "mc", "category": "✝️ New Testament", "question": "Paul famous love chapter is found in which book?", "options": ["Romans", "Ephesians", "1 Corinthians", "Philippians"], "correct": 2, "fact": "1 Corinthians 13 — Love is patient, love is kind... Paul wrote this to a quarrelsome Corinthian church, showing love as the greatest virtue."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Job was from the land of Uz.", "options": ["True", "False"], "correct": 0, "fact": "Job 1:1 — In the land of Uz there lived a man whose name was Job. Uz is likely in the region of Edom or Arabia."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does Amen mean?", "options": ["Goodbye", "So be it or truly", "Thank you God", "Praise be"], "correct": 1, "fact": "Amen comes from a Hebrew root meaning firm or trustworthy. Used at the end of prayers, it means let it be so. Jesus often began statements with Truly, truly I say to you."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The city of Athens had an altar dedicated To An Unknown God.", "options": ["True", "False"], "correct": 0, "fact": "Acts 17:23 — Paul noticed an altar inscribed To An Unknown God and used it as a bridge to proclaim the God of the Bible to the Athenians."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What happened when youths mocked the prophet Elisha for being bald?", "options": ["He wept", "He prayed for them", "Bears came out of the woods", "He struck them blind"], "correct": 2, "fact": "2 Kings 2:24 — When youths mocked Elisha saying Go up, bald head!, two bears came out of the woods and mauled 42 of them."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Habakkuk questioned God about why He allowed injustice and evil.", "options": ["True", "False"], "correct": 0, "fact": "Habakkuk 1:2-3 — How long, Lord, must I call for help, but you do not listen? Habakkuk boldly wrestled with God silence in the face of wickedness."}, {"type": "mc", "category": "✝️ New Testament", "question": "Which disciple is called the disciple whom Jesus loved in John Gospel?", "options": ["Peter", "James", "John", "Andrew"], "correct": 2, "fact": "John is believed to be the beloved disciple referenced in John 13:23, 19:26, and 20:2. He never names himself, using this tender description instead."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Moses died before entering the Promised Land.", "options": ["True", "False"], "correct": 0, "fact": "Deuteronomy 34 — God showed Moses the Promised Land from Mount Nebo, then Moses died at age 120. He had struck the rock instead of speaking to it (Numbers 20:12)."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does atonement mean in biblical terms?", "options": ["Achieving moral perfection", "Making amends for sin to restore relationship with God", "Being filled with the Holy Spirit", "The act of repentance"], "correct": 1, "fact": "Atonement (Hebrew: kaphar, to cover) refers to making things right between God and sinners — through sacrifice in the OT, and ultimately through Jesus death once for all."}, {"type": "mc", "category": "✝️ New Testament", "question": "Which angel announced the birth of Jesus to Mary?", "options": ["Michael", "Raphael", "Gabriel", "Uriel"], "correct": 2, "fact": "Luke 1:26-28 — God sent the angel Gabriel to Nazareth, to a virgin pledged to be married to a man named Joseph. The virgin name was Mary."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Israel crossed the Jordan River on dry ground, just as ancestors crossed the Red Sea.", "options": ["True", "False"], "correct": 0, "fact": "Joshua 3:17 — The priests carrying the ark stood in the middle of the dry riverbed while all Israel crossed on dry ground. God repeated the Red Sea miracle."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "Which mountain did Moses receive the Ten Commandments on?", "options": ["Mount Zion", "Mount Moriah", "Mount Sinai", "Mount Nebo"], "correct": 2, "fact": "Exodus 19:20 — The Lord descended on Mount Sinai and called Moses to the top. It is also called Horeb in Deuteronomy."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Epistle of James emphasizes that faith without works is dead.", "options": ["True", "False"], "correct": 0, "fact": "James 2:17 — In the same way, faith by itself, if it is not accompanied by action, is dead. James emphasizes genuine faith expressed through practical living."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What city did Jonah refuse to go to at first?", "options": ["Babylon", "Jerusalem", "Nineveh", "Tyre"], "correct": 2, "fact": "Jonah 1:2 — God told Jonah to go to Nineveh, the great Assyrian capital. Jonah fled in the opposite direction, boarding a ship to Tarshish."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Zechariah (John the Baptist father) was struck mute because he doubted the angel.", "options": ["True", "False"], "correct": 0, "fact": "Luke 1:18-20 — Zechariah asked How can I be sure? I am an old man. Gabriel told him he would be silent until the baby was born because he did not believe."}, {"type": "mc", "category": "✝️ New Testament", "question": "On the Mount of Transfiguration, whose voice came from a cloud?", "options": ["The angel Gabriel", "God the Father", "The Holy Spirit", "Moses"], "correct": 1, "fact": "Matthew 17:5 — A bright cloud covered them, and a voice from the cloud said, This is my Son, whom I love; with him I am well pleased. Listen to him!"}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The city of Babylon was located in modern-day Iraq.", "options": ["True", "False"], "correct": 0, "fact": "Ancient Babylon was located near the Euphrates River in modern Iraq, about 85 km south of Baghdad. It was the capital of Nebuchadnezzar empire."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does the name Israel mean?", "options": ["Child of promise", "One who struggles with God", "Chosen people", "Blessed nation"], "correct": 1, "fact": "Genesis 32:28 — After Jacob wrestled with God, He said Your name will no longer be Jacob, but Israel, because you have struggled with God and with humans and have overcome."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The book of Philemon asks a slave owner to receive a runaway slave back as a brother.", "options": ["True", "False"], "correct": 0, "fact": "Paul wrote to Philemon on behalf of his runaway slave Onesimus, who had become a Christian. Paul asked Philemon to receive him back as a dear brother."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Which book contains the story of Rahab who helped Israelite spies?", "options": ["Judges", "Numbers", "Joshua", "Ruth"], "correct": 2, "fact": "Joshua 2 — Rahab hid the two spies on her roof and helped them escape. She hung a scarlet cord from her window as a sign of protection."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Malachi prophesied God would send Elijah before the Day of the Lord.", "options": ["True", "False"], "correct": 0, "fact": "Malachi 4:5 — I will send the prophet Elijah to you before that great and dreadful day of the Lord comes. Jesus said this was fulfilled in John the Baptist."}, {"type": "mc", "category": "✝️ New Testament", "question": "Which letter instructs Christians to put on the full armor of God?", "options": ["Colossians", "Romans", "Ephesians", "Philippians"], "correct": 2, "fact": "Ephesians 6:13 — Paul lists six pieces of armor: belt of truth, breastplate of righteousness, shoes of peace, shield of faith, helmet of salvation, and sword of the Spirit."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The Sea of Galilee is also called the Sea of Tiberias and the Lake of Gennesaret.", "options": ["True", "False"], "correct": 0, "fact": "The same body of water has multiple names: Sea of Galilee (Matthew), Sea of Tiberias (John 6:1), and Lake of Gennesaret (Luke 5:1)."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does Maranatha mean?", "options": ["Praise to God", "Come, Lord!", "Grace and peace", "Holy is the Lord"], "correct": 1, "fact": "1 Corinthians 16:22 — Maranatha is an Aramaic phrase meaning Come, Lord! or Our Lord, come! It expresses early Christian longing for Christ return."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Paul wrote the letter to the Philippians while in prison.", "options": ["True", "False"], "correct": 0, "fact": "Philippians 1:7,13 — Paul wrote from prison. Despite imprisonment, the letter overflows with joy and thanksgiving."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What was the name of the garden where Adam and Eve lived?", "options": ["Garden of Gethsemane", "Garden of Eden", "Garden of the Lord", "Garden of Canaan"], "correct": 1, "fact": "Genesis 2:8 — The Lord God had planted a garden in the east, in Eden, and there he put the man he had formed. Eden means delight or paradise."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: The book of Lamentations mourns the destruction of Jerusalem by Babylon.", "options": ["True", "False"], "correct": 0, "fact": "Lamentations is traditionally attributed to Jeremiah and expresses grief over Jerusalem fall in 586 BC. It is written as five acrostic poems in Hebrew."}, {"type": "mc", "category": "✝️ New Testament", "question": "In which city did the disciples first receive the name Christians?", "options": ["Jerusalem", "Rome", "Antioch", "Corinth"], "correct": 2, "fact": "Acts 11:26 — The disciples were called Christians first at Antioch. The church at Antioch became the first major Gentile church and base for Paul journeys."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Isaiah had a vision of God on His throne with six-winged seraphim.", "options": ["True", "False"], "correct": 0, "fact": "Isaiah 6:1-3 — Isaiah saw the Lord seated on a high throne. Seraphim with six wings called: Holy, holy, holy is the Lord Almighty."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What are the first five books of the Bible collectively called?", "options": ["The Psalms", "The Pentateuch", "The Gospels", "The Prophets"], "correct": 1, "fact": "Genesis through Deuteronomy are called the Pentateuch (Greek for five scrolls), the Torah in Hebrew, or the Books of Moses."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Apostle Peter wrote two letters found in the New Testament.", "options": ["True", "False"], "correct": 0, "fact": "1 Peter and 2 Peter are both attributed to the Apostle Peter. 1 Peter addresses suffering and hope; 2 Peter warns against false teachers."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Which king had 700 wives and 300 concubines?", "options": ["David", "Rehoboam", "Ahab", "Solomon"], "correct": 3, "fact": "1 Kings 11:3 — Solomon had 700 wives of royal birth and 300 concubines. These women turned his heart away from the Lord in his old age."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Zechariah had visions including a flying scroll and a woman in a basket.", "options": ["True", "False"], "correct": 0, "fact": "Zechariah 5 records a flying scroll (curse on sin) and a woman inside a basket (representing wickedness), among eight night visions."}, {"type": "mc", "category": "✝️ New Testament", "question": "What does Paul call the wages of sin in Romans 6:23?", "options": ["Suffering", "Death", "Separation", "Judgment"], "correct": 1, "fact": "Romans 6:23 — For the wages of sin is death, but the gift of God is eternal life in Christ Jesus our Lord. Wages are earned; eternal life is a gift."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: Lot wife turned into a pillar of salt when she looked back at Sodom.", "options": ["True", "False"], "correct": 0, "fact": "Genesis 19:26 — Despite the angels warning not to look back, Lot wife looked back and became a pillar of salt. Jesus later referenced her (Luke 17:32)."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "Which prophet name means Who is like God?", "options": ["Elijah", "Michael", "Micah", "Daniel"], "correct": 2, "fact": "Micah comes from the Hebrew Mikah, meaning Who is like Yahweh? It is a rhetorical question implying no one compares to God."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Paul letter to the Romans is the longest of his epistles.", "options": ["True", "False"], "correct": 0, "fact": "Romans, with 16 chapters and 433 verses, is Paul longest letter and his most systematic treatment of salvation theology."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What was the name of Moses father-in-law?", "options": ["Aaron", "Jethro", "Eleazar", "Caleb"], "correct": 1, "fact": "Exodus 3:1 — Moses was keeping the flock of his father-in-law Jethro. Jethro later wisely advised Moses to delegate leadership."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: The Minor Prophets are called minor because their messages are less important.", "options": ["True", "False"], "correct": 1, "fact": "The terms Major and Minor refer to the length of the books, not their importance. Obadiah has only 21 verses but carries a weighty message of judgment."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What name did God reveal to Moses at the burning bush?", "options": ["El Shaddai", "Adonai", "I AM WHO I AM", "Yahweh Nissi"], "correct": 2, "fact": "Exodus 3:14 — God said to Moses, I AM WHO I AM. This name (YHWH) became the personal covenant name of God for Israel."}, {"type": "tf", "category": "📖 Revelation", "question": "True or False: The book of Revelation describes seven seals, seven trumpets, and seven bowls of judgment.", "options": ["True", "False"], "correct": 0, "fact": "Revelation 6-16 describes three series of seven judgments, each progressively more intense, culminating before Christ return."}, {"type": "mc", "category": "📖 Revelation", "question": "What is the number of the beast in the book of Revelation?", "options": ["616", "666", "777", "999"], "correct": 1, "fact": "Revelation 13:18 — 666 is the number of the beast. Many scholars interpret this as a coded reference (gematria) to a Roman emperor, likely Nero."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The High Priest entered the Holy of Holies only once a year, on Yom Kippur.", "options": ["True", "False"], "correct": 0, "fact": "Leviticus 16 — On the Day of Atonement (Yom Kippur), the High Priest entered the Holy of Holies with incense and blood to atone for all of Israel sins."}, {"type": "mc", "category": "✝️ New Testament", "question": "In Acts 17, where did Paul preach about the Unknown God?", "options": ["The Colosseum", "The Areopagus in Athens", "A synagogue in Corinth", "The Temple in Jerusalem"], "correct": 1, "fact": "Acts 17:22 — Paul stood in the meeting of the Areopagus (Mars Hill) and addressed Athenian intellectuals, including Epicurean and Stoic philosophers."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The Israelites were in Egypt for 430 years according to Exodus 12.", "options": ["True", "False"], "correct": 0, "fact": "Exodus 12:40-41 — The length of time the Israelite people lived in Egypt was 430 years. At the end of the 430 years, to the very day, all the Lord divisions left Egypt."}, {"type": "mc", "category": "📖 Revelation", "question": "What is the name of the final battle in Revelation?", "options": ["Gethsemane", "Megiddo", "Armageddon", "Jezreel"], "correct": 2, "fact": "Revelation 16:16 — They gathered the kings together to the place called Armageddon, derived from Har Megiddo, the hill of Megiddo in Israel."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Daniel refused to eat the king food in order to remain ritually pure.", "options": ["True", "False"], "correct": 0, "fact": "Daniel 1:8 — Daniel resolved not to defile himself with the royal food and wine, and he asked for permission not to defile himself this way."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What was Moses sister name?", "options": ["Rahab", "Miriam", "Deborah", "Zipporah"], "correct": 1, "fact": "Miriam (Exodus 15:20) was Moses older sister who watched over him in the basket on the Nile, and led the women in praise after the Red Sea crossing."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The church at Laodicea in Revelation was called lukewarm.", "options": ["True", "False"], "correct": 0, "fact": "Revelation 3:16 — Jesus said Because you are lukewarm — neither hot nor cold — I am about to spit you out of my mouth. Laodicea was famous for its tepid water."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "Who wrote the book of Proverbs primarily?", "options": ["David", "Solomon", "Isaiah", "Moses"], "correct": 1, "fact": "Proverbs 1:1 — The proverbs of Solomon son of David, king of Israel. Solomon also composed 1,005 songs and spoke 3,000 proverbs (1 Kings 4:32)."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The ten tribes of the northern kingdom of Israel were exiled by Assyria.", "options": ["True", "False"], "correct": 0, "fact": "2 Kings 17 — In 722 BC, the Assyrians conquered Samaria and deported Israel people. These are sometimes called the ten lost tribes."}, {"type": "mc", "category": "✝️ New Testament", "question": "Paul wrote I can do all this through him who gives me ___ in Philippians 4:13.", "options": ["Power", "Strength", "Wisdom", "Grace"], "correct": 1, "fact": "Philippians 4:13 — I can do all this through him who gives me strength. In context, Paul is talking about contentment in all circumstances."}, {"type": "tf", "category": "📖 Revelation", "question": "True or False: The New Jerusalem in Revelation is described as a cube-shaped city.", "options": ["True", "False"], "correct": 0, "fact": "Revelation 21:16 — The city is 12,000 stadia long, wide, and high — a perfect cube. The proportions echo the Holy of Holies in Solomon Temple."}, {"type": "mc", "category": "⚡ Old Testament", "question": "Which two spies gave a faithful report after scouting Canaan?", "options": ["Moses and Aaron", "Joshua and Caleb", "Gad and Reuben", "Eleazar and Phinehas"], "correct": 1, "fact": "Numbers 14:6-9 — Joshua and Caleb tore their clothes and urged the people: Do not rebel against the Lord... We will devour them. The other ten gave a discouraging report."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: Peter shadow alone healed people in the early church.", "options": ["True", "False"], "correct": 0, "fact": "Acts 5:15 — People brought the sick into the streets so that at least Peter shadow might fall on some of them as he passed by."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "Which book in the Bible never mentions the name of God?", "options": ["Ruth", "Esther", "Ecclesiastes", "Song of Solomon"], "correct": 1, "fact": "The book of Esther never explicitly mentions God, yet the story is full of His providential care and timing as He works behind the scenes."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The Ark of the Covenant was eventually placed in Solomon Temple.", "options": ["True", "False"], "correct": 0, "fact": "1 Kings 8:6 — The priests brought the ark to its place in the inner sanctuary of the temple, the Most Holy Place. It disappeared after Babylon destroyed the temple."}, {"type": "mc", "category": "✝️ New Testament", "question": "According to Hebrews 11, faith is the substance of things hoped for and the ___ of things not seen.", "options": ["Promise", "Evidence", "Power", "Grace"], "correct": 1, "fact": "Hebrews 11:1 — Now faith is confidence in what we hope for and assurance about what we do not see. This chapter catalogs the OT heroes of faith."}, {"type": "tf", "category": "📜 Prophets", "question": "True or False: Isaiah 40 begins with the words Comfort, comfort my people.", "options": ["True", "False"], "correct": 0, "fact": "Isaiah 40:1-2 — Comfort, comfort my people, says your God. Speak tenderly to Jerusalem. This begins the hopeful second section of Isaiah."}, {"type": "mc", "category": "⚡ Old Testament", "question": "What nation was Goliath from?", "options": ["Moab", "Philistia", "Ammon", "Edom"], "correct": 1, "fact": "1 Samuel 17:4 — A champion named Goliath, who was from Gath, came out of the Philistine camp. The Philistines were Israel frequent adversaries."}, {"type": "tf", "category": "✝️ New Testament", "question": "True or False: The Holy Spirit is described as a Helper or Comforter in the Gospel of John.", "options": ["True", "False"], "correct": 0, "fact": "John 14:16,26 — Jesus promised another Helper (Greek: Paraclete), translated Comforter, Counselor, or Advocate. The Spirit teaches and reminds believers."}, {"type": "mc", "category": "📖 Bible Knowledge", "question": "What does Abba mean in the New Testament?", "options": ["Master", "Lord", "Father", "Teacher"], "correct": 2, "fact": "Romans 8:15 and Mark 14:36 — Abba, Father is an Aramaic term of intimate address, like Daddy. Jesus used it in Gethsemane."}, {"type": "tf", "category": "⚡ Old Testament", "question": "True or False: The book of Numbers gets its name from two censuses of Israel.", "options": ["True", "False"], "correct": 0, "fact": "Numbers 1 and 26 both record a census of Israelite men of fighting age. The book documents Israel journey from Sinai through the wilderness."}, {"type": "mc", "category": "✝️ New Testament", "question": "Which parable describes a father running to meet his returning son?", "options": ["The Lost Sheep", "The Lost Coin", "The Prodigal Son", "The Ten Virgins"], "correct": 2, "fact": "Luke 15:20 — While he was still a long way off, his father saw him and was filled with compassion; he ran to his son, threw his arms around him and kissed him."}, {"type": "tf", "category": "📖 Revelation", "question": "True or False: The four living creatures i
